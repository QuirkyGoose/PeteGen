<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<meta name="color-scheme" content="dark" />
<title>Stream Predictions</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>P</text></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════════════════
     STREAM PREDICTIONS OVERLAY
     Build: 2026-07-22-phase3-4-5-original

     Phase 3:
     - EventSub reconnect hardening
     - keepalive watchdog
     - exponential backoff
     - duplicate notification protection
     - revocation handling
     - token expiry handling
     - debug panel (?debug=1)
     - reset (?reset=1)

     Phase 4:
     - ?mode=full|vertical|compact
     - ?layout=bottom|right
     - ?scale=0.4–2
     - ?safe=px
     - ?clickthrough=1
     - ?test=active|locked|resolved|canceled
     - per-mode saved position
     - postMessage control API

     Phase 5:
     - locked/canceled visual polish
     - leader highlight polish
     - optional plate background
     - optional high-contrast mode
     - optional reduced-motion mode
     - smoother state treatment
     ═══════════════════════════════════════════════════════════════ -->

<script>
(function () {
  var P = new URLSearchParams(window.location.search);

  function flag(name) {
    var v = P.get(name);
    return v !== null && v !== '0' && v !== 'false';
  }

  var h = document.documentElement;

  if (flag('clickthrough')) h.classList.add('clickthrough');
  if (flag('plate')) h.classList.add('plate');
  if (P.get('contrast') === 'high') h.classList.add('contrast-high');
  if (P.get('motion') === 'off') h.classList.add('motion-off');
  if (flag('debug')) h.classList.add('debug');

  var scale = parseFloat(P.get('scale'));
  if (isFinite(scale)) {
    scale = Math.min(2, Math.max(0.4, scale));
    h.style.setProperty('--overlay-scale', String(scale));
  }

  var safe = parseInt(P.get('safe'), 10);
  if (isFinite(safe) && safe >= 0) {
    h.style.setProperty('--safe', safe + 'px');
  }
})();
</script>

<style>
  :root {
    --bg: #020203;
    --panel: #08080a;
    --panel-hover: rgba(255, 255, 255, 0.04);

    --t1: rgba(255, 255, 255, 0.92);
    --t2: rgba(255, 255, 255, 0.55);
    --t3: rgba(255, 255, 255, 0.32);
    --t4: rgba(255, 255, 255, 0.18);

    --line: rgba(255, 255, 255, 0.08);
    --line-soft: rgba(255, 255, 255, 0.05);

    --amber: #d4a853;
    --amber-soft: rgba(212, 168, 83, 0.5);

    --red: #c4473a;
    --ok: #88b576;

    --body: 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, monospace;
    --serif: 'Instrument Serif', Georgia, serif;

    --overlay-scale: 1;
    --safe: 0px;

    /* Outcome colours — no blue/purple/cyan */
    --c0: #d4a853;
    --c1: #d49274;
    --c2: #9bbf9b;
    --c3: #d9a3b8;
    --c4: #e8c87a;
    --c5: #cf8b4a;
    --c6: #b57e8f;
    --c7: #a3b57a;
    --c8: #c47a5a;
    --c9: #c4473a;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    background: transparent;
    color: var(--t1);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  :focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 2px;
  }

  /* ═══ Phase 4/5 display modifiers ═══ */

  html.clickthrough * {
    pointer-events: none !important;
  }

  html.motion-off *,
  html.motion-off *::before,
  html.motion-off *::after {
    animation: none !important;
    transition: none !important;
  }

  html.plate .prediction-overlay {
    background: rgba(2, 2, 3, 0.78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  html.contrast-high .prediction-overlay {
    background: #000000;
    border-color: rgba(255, 255, 255, 0.24);
  }

  html.contrast-high .pred-question,
  html.contrast-high .pred-option-text,
  html.contrast-high .pred-option-pct,
  html.contrast-high .pred-footer-meta,
  html.contrast-high .pred-footer-status {
    color: #ffffff;
  }

  html.contrast-high .pred-option {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.18);
  }

  html.contrast-high .pred-option-bar {
    opacity: 0.18;
  }

  /* ═══ Connect screen ═══ */

  .connect-screen {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: var(--bg);
  }

  .connect-screen.hidden {
    display: none;
  }

  .connect-title {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 400;
    color: var(--t1);
    letter-spacing: -0.02em;
  }

  .connect-title em {
    font-style: italic;
    color: var(--amber);
  }

  .connect-sub {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--t3);
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
  }

  .connect-btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--t1);
    background: rgba(212, 168, 83, 0.12);
    border: 1px solid rgba(212, 168, 83, 0.35);
    border-radius: 100px;
    padding: 14px 32px;
    cursor: pointer;
    transition:
      background 0.2s ease,
      border-color 0.2s ease,
      transform 0.2s ease,
      opacity 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .connect-btn:hover {
    background: rgba(212, 168, 83, 0.2);
    border-color: rgba(212, 168, 83, 0.55);
    transform: translateY(-1px);
  }

  .connect-btn:active {
    transform: translateY(0);
  }

  .connect-btn.loading {
    opacity: 0.6;
    pointer-events: none;
  }

  .connect-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .connect-btn--test {
    background: rgba(212, 168, 83, 0.08);
    border-color: rgba(212, 168, 83, 0.3);
    color: var(--amber);
  }

  .connect-status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--t3);
    margin-top: 8px;
  }

  .connect-status.error {
    color: var(--red);
  }

  .connect-status.success {
    color: var(--ok);
  }

  /* ═══ Floating test button ═══ */

  .float-test-btn {
    position: fixed;
    left: 18px;
    bottom: 18px;
    z-index: 400;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--t2);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition:
      color 0.2s ease,
      border-color 0.2s ease,
      transform 0.2s ease;
  }

  .float-test-btn.visible {
    display: flex;
  }

  .float-test-btn:hover {
    color: var(--amber);
    border-color: var(--amber-soft);
    transform: translateY(-1px);
  }

  .float-test-btn svg {
    width: 15px;
    height: 15px;
  }

  /* ═══ Prediction overlay ═══ */

  .prediction-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 560px;
    max-height: 90vh;
    z-index: 100;
    display: none;
    flex-direction: column;
    gap: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
    transform: scale(var(--overlay-scale, 1));
    transform-origin: top left;
    animation: overlayIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  .prediction-overlay.visible {
    display: flex;
  }

  .prediction-overlay.hidden {
    display: none !important;
  }

  @keyframes overlayIn {
    from {
      opacity: 0;
      margin-top: 20px;
    }
    to {
      opacity: 1;
      margin-top: 0;
    }
  }

  .prediction-overlay.slide-out {
    animation: overlayOut 0.5s cubic-bezier(0.4, 0, 1, 1) both;
  }

  @keyframes overlayOut {
    from {
      opacity: 1;
      margin-top: 0;
    }
    to {
      opacity: 0;
      margin-top: 20px;
    }
  }

  /* ── Header ── */

  .pred-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line-soft);
    cursor: move;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  .pred-header:active {
    cursor: grabbing;
  }

  .pred-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pred-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
    animation: dotPulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  .pred-dot.locked {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: none;
  }

  .pred-dot.ended {
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
    animation: none;
  }

  .pred-dot.canceled {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: none;
  }

  @keyframes dotPulse {
    0%, 100% {
      opacity: 0.5;
      transform: scale(1);
    }
    50% {
      opacity: 1;
      transform: scale(1.3);
    }
  }

  .pred-timer {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  .pred-timer.urgent {
    color: var(--red);
    animation: urgentBlink 1s ease-in-out infinite;
  }

  .pred-timer.ended {
    color: var(--t3);
  }

  @keyframes urgentBlink {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.4;
    }
  }

  /* ── Countdown progress bar ── */

  .pred-progress {
    height: 2px;
    background: rgba(255, 255, 255, 0.06);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .pred-progress.visible {
    opacity: 1;
  }

  .pred-progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--amber), #e8c87a);
    box-shadow: 0 0 8px rgba(212, 168, 83, 0.35);
    transition: width 1s linear;
  }

  .pred-progress-fill.urgent {
    background: linear-gradient(90deg, var(--red), #e08a7a);
    box-shadow: 0 0 8px rgba(196, 71, 58, 0.35);
  }

  /* ── Question ── */

  .pred-question {
    padding: 12px 16px 10px;
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    line-height: 1.25;
    color: var(--t1);
    letter-spacing: -0.005em;
  }

  .prediction-overlay[data-status="canceled"] .pred-question {
    color: var(--t2);
  }

  /* ── Body ── */

  .pred-body {
    display: flex;
    flex-direction: column;
  }

  .pred-body.layout-right {
    flex-direction: row;
    align-items: stretch;
  }

  .pred-body.layout-right .pred-options {
    flex: 1;
    min-width: 0;
  }

  .pred-body.layout-right .pred-results {
    width: 200px;
    flex-shrink: 0;
    border-left: 1px solid var(--line-soft);
    padding: 8px 12px;
    max-height: 300px;
    overflow-y: auto;
  }

  .pred-body.layout-right .pred-results::-webkit-scrollbar {
    width: 3px;
  }

  .pred-body.layout-right .pred-results::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 2px;
  }

  /* ── Options ── */

  .pred-options {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pred-option {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.02);
    transition:
      border-color 0.3s ease,
      box-shadow 0.3s ease,
      opacity 0.3s ease,
      filter 0.3s ease;
    animation: optionIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes optionIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .prediction-overlay[data-status="locked"] .pred-option {
    opacity: 0.82;
  }

  .prediction-overlay[data-status="locked"] .pred-option-bar {
    opacity: 0.08 !important;
  }

  .prediction-overlay[data-status="canceled"] .pred-option {
    opacity: 0.55;
    filter: saturate(0.55);
  }

  .prediction-overlay[data-status="canceled"] .pred-option-bar {
    opacity: 0.05 !important;
  }

  .pred-option.leading {
    border-color: rgba(212, 168, 83, 0.32);
  }

  .pred-option.leading .pred-option-pct {
    color: var(--t1);
  }

  .pred-option.winner {
    border-color: rgba(212, 168, 83, 0.5);
    box-shadow: 0 0 20px rgba(212, 168, 83, 0.15);
  }

  .pred-option-bar {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    transform-origin: left center;
    transition: transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
    pointer-events: none;
  }

  .pred-option-content {
    position: relative;
    z-index: 1;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pred-option-color {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow 0.3s ease;
  }

  .pred-option-text {
    flex: 1;
    min-width: 0;
    font-family: var(--body);
    font-size: 13px;
    font-weight: 500;
    color: var(--t1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pred-option-pct {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--t2);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    transition: color 0.3s ease;
  }

  .pred-option.winner .pred-option-pct {
    color: var(--amber);
  }

  .pred-winner-badge {
    display: none;
    font-family: var(--mono);
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    background: rgba(212, 168, 83, 0.1);
    border: 1px solid rgba(212, 168, 83, 0.3);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .pred-option.winner .pred-winner-badge {
    display: inline-block;
  }

  .pred-top-contributor {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--t3);
    padding-left: 24px;
    margin-top: -2px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: none;
  }

  .pred-top-contributor.visible {
    display: block;
  }

  .pred-top-contributor .tc-name {
    color: var(--t2);
  }

  /* ── Results ── */

  .pred-results {
    padding: 0 16px 14px;
    display: none;
    flex-direction: column;
    gap: 4px;
  }

  .pred-results.visible {
    display: flex;
  }

  .pred-result-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--line-soft);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    animation: resultIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes resultIn {
    from {
      opacity: 0;
      transform: translateX(-8px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .pred-result-name {
    flex: 1;
    min-width: 0;
    color: var(--t2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pred-result-amount {
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  .pred-result-amount.won {
    color: var(--ok);
  }

  .pred-result-amount.lost {
    color: var(--red);
  }

  .pred-result-color {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Footer ── */

  .pred-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    border-top: 1px solid var(--line-soft);
  }

  .pred-footer-meta {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--t3);
  }

  .pred-footer-status {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--t2);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pred-status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--t3);
  }

  .pred-status-dot.active {
    background: var(--ok);
    box-shadow: 0 0 6px var(--ok);
  }

  .pred-status-dot.locked {
    background: var(--red);
  }

  .pred-status-dot.ended {
    background: var(--amber);
  }

  .pred-status-dot.canceled {
    background: var(--red);
  }

  /* ── Header buttons ── */

  .compact-toggle-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--t3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition:
      color 0.2s ease,
      border-color 0.2s ease;
    padding: 0;
  }

  .compact-toggle-btn:hover {
    color: var(--amber);
    border-color: var(--amber-soft);
  }

  .compact-toggle-btn.active {
    color: var(--amber);
    border-color: var(--amber-soft);
  }

  /* ═══ Vertical mode ═══ */

  .prediction-overlay.vertical {
    width: 220px;
    top: 0;
    left: 0;
    bottom: auto;
    max-height: 100vh;
    border-radius: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  .prediction-overlay.vertical.visible {
    display: flex;
  }

  .prediction-overlay.vertical .pred-header {
    padding: 10px 14px;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 6px;
  }

  .prediction-overlay.vertical .pred-label {
    font-size: 9px;
    gap: 6px;
    flex: 1;
  }

  .prediction-overlay.vertical .pred-timer {
    font-size: 14px;
    font-weight: 700;
  }

  .prediction-overlay.vertical .pred-question {
    padding: 6px 14px 8px;
    font-size: 14px;
    line-height: 1.3;
    flex-shrink: 0;
  }

  .prediction-overlay.vertical .pred-body {
    flex: 0 1 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .prediction-overlay.vertical .pred-options {
    flex: 0 1 auto;
    padding: 4px 10px;
    gap: 4px;
    overflow-y: auto;
    max-height: 50vh;
  }

  .prediction-overlay.vertical .pred-options::-webkit-scrollbar {
    width: 3px;
  }

  .prediction-overlay.vertical .pred-options::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 2px;
  }

  .prediction-overlay.vertical .pred-option {
    height: 36px;
    border-radius: 6px;
  }

  .prediction-overlay.vertical .pred-option-content {
    padding: 0 10px;
    height: 100%;
  }

  .prediction-overlay.vertical .pred-option-color {
    display: none;
  }

  .prediction-overlay.vertical .pred-option-bar {
    opacity: 0.2;
    border-radius: 6px;
  }

  .prediction-overlay.vertical .pred-option-text {
    font-size: 11px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ═══ Compact mode ═══ */

  .prediction-overlay.compact .pred-header {

  .prediction-overlay.compact .pred-question {
    display: none !important;

  }

  .prediction-overlay.compact .pred-body {

    overflow: hidden;

  .prediction-overlay.compact .pred-results {
    display: none !important;
    padding: 0 !important;
    margin: 0 !important;

    max-height: 0 !important;

  .prediction-overlay.compact .pred-options {

  }

  }

  .prediction-overlay.compact .pred-winner-badge {

  /* ═══ Celebration particles ═══ */

  .celebration-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    will-change: transform, opacity;
  }

  /* ═══ Toast ═══ */

  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
    background: var(--panel);
    border: 1px solid rgba(212, 168, 83, 0.3);
    border-radius: 100px;
    padding: 8px 16px;
    opacity: 0;
    transform: translateY(10px);
    transition:
      opacity 0.3s ease,
      transform 0.3s ease;
    pointer-events: none;
    z-index: 300;
  }

  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .toast--success {
    color: var(--ok);
    border-color: rgba(136, 181, 118, 0.4);
  }

  .toast--error {
    color: var(--red);
    border-color: rgba(196, 71, 58, 0.4);
  }

  /* ═══ Compact floating results ═══ */

  .compact-results {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    display: none;
    padding-bottom: 6px;
    width: 320px;
  }

  .compact-results.visible {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: stretch;
  }

  .compact-result-item {
    font-family: var(--mono);
    font-size: 10px;

    transform: translateY(-8px);

      opacity 0.35s ease,
      transform 0.35s ease;
  }

  .compact-result-item.show {
    opacity: 1;
    transform: translateY(0);
  }

  .compact-result-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;

  }

  .compact-result-name {
    color: var(--t1);
  }

  .compact-result-amount {
    font-variant-numeric: tabular-nums;
  }

  .compact-result-amount.won {
    color: var(--ok);
  }

  .compact-result-amount.lost {
    color: var(--red);
  }

  /* ═══ Debug panel ═══ */

  #sp-debug {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 1000;
    max-width: 340px;
    background: rgba(2, 2, 3, 0.88);
    border: 1px solid var(--line);
    color: var(--t2);
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.45;
    letter-spacing: 0.04em;
    padding: 10px 12px;
    border-radius: 10px;
    pointer-events: none;
    white-space: pre;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    display: none;
  }

  html.debug #sp-debug {
    display: block;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
