      <span id="predStatusText">Active</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  // ═══════════════════════════════════════════════════════════════
  // BUILD
  // ═══════════════════════════════════════════════════════════════

  var BUILD = '2026-07-22-phase3-4-5-original';

  console.log(
    '%c[Stream Predictions]%c build ' + BUILD,
    'color:#d4a853;font-weight:bold',
    'color:inherit'
  );

  // ═══════════════════════════════════════════════════════════════
  // URL PARAMS
  // ═══════════════════════════════════════════════════════════════

  var P = new URLSearchParams(window.location.search);

  function paramFlag(name) {
    var v = P.get(name);
    return v !== null && v !== '0' && v !== 'false';
  }

  function clamp(n, min, max) {
    return Math.min(max, Math.max(min, n));
  }

  function shortId(id) {
    var s = String(id || '');
    return s.length > 10 ? s.slice(0, 10) + '…' : s;
  }

  var didReset = paramFlag('reset');

  var STORAGE_KEYS = [
    'stream-predictions-twitch-token',
    'stream-predictions-twitch-token-expires',
    'stream-predictions-mode',
    'stream-predictions-compact',
    'stream-predictions-layout',
    'stream-predictions-position-full',
    'stream-predictions-position-vertical',
    'stream-predictions-position-compact'
  ];

  if (didReset) {
    try {
      STORAGE_KEYS.forEach(function (key) {
        localStorage.removeItem(key);
      });
    } catch (e) {}
  }

  var CLIENT_ID = P.get('client_id') || '3iov7b5p32ry0cvbbr79sygd91o7a5';

  var REDIRECT_URI =
    P.get('redirect_uri') ||
    (window.location.origin && window.location.origin !== 'null'
      ? window.location.origin + window.location.pathname
      : window.location.href.split('#')[0]);

  var SCOPES = 'channel:read:predictions';

  var TOKEN_STORAGE_KEY = 'stream-predictions-twitch-token';
  var TOKEN_EXPIRY_KEY = 'stream-predictions-twitch-token-expires';
  var MODE_KEY = 'stream-predictions-mode';
  var LAYOUT_KEY = 'stream-predictions-layout';
  var POS_PREFIX = 'stream-predictions-position-';

  var ui = {
    scale: clamp(parseFloat(P.get('scale')) || 1, 0.4, 2),
    safe: Math.max(0, parseInt(P.get('safe'), 10) || 0),
    clickthrough: paramFlag('clickthrough'),
    plate: paramFlag('plate'),
    contrastHigh: P.get('contrast') === 'high',
    motionOff: P.get('motion') === 'off',
    debug: paramFlag('debug')
  };

  var docEl = document.documentElement;

  if (ui.clickthrough) docEl.classList.add('clickthrough');
  if (ui.plate) docEl.classList.add('plate');
  if (ui.contrastHigh) docEl.classList.add('contrast-high');
  if (ui.motionOff) docEl.classList.add('motion-off');
  if (ui.debug) docEl.classList.add('debug');

  docEl.style.setProperty('--overlay-scale', String(ui.scale));
  docEl.style.setProperty('--safe', ui.safe + 'px');

  var displayMode = (function () {
    var m = P.get('mode');
    if (m === 'full' || m === 'vertical' || m === 'compact') return m;

    if (paramFlag('vertical') || paramFlag('compact')) return 'vertical';
    if (paramFlag('full')) return 'full';

    try {
      var stored = localStorage.getItem(MODE_KEY) || localStorage.getItem('stream-predictions-compact');
      if (stored === 'full' || stored === 'vertical' || stored === 'compact') return stored;
      if (stored === 'true' || stored === '1') return 'vertical';
      if (stored === 'false' || stored === '0') return 'full';
    } catch (e) {}

    return 'vertical';
  })();

  var resultsLayout = (function () {
    if (P.get('layout') === 'right') return 'right';
    if (P.get('layout') === 'bottom') return 'bottom';

    try {
      return localStorage.getItem(LAYOUT_KEY) === 'right' ? 'right' : 'bottom';
    } catch (e) {
      return 'bottom';
    }
  })();

  // ═══════════════════════════════════════════════════════════════
  // DOM REFS
  // ═══════════════════════════════════════════════════════════════

  var connectScreen = document.getElementById('connectScreen');
  var connectBtn = document.getElementById('connectBtn');
  var connectStatus = document.getElementById('connectStatus');
  var testBtn = document.getElementById('testBtn');
  var floatTestBtn = document.getElementById('floatTestBtn');
  var compactResults = document.getElementById('compactResults');

  var predictionOverlay = document.getElementById('predictionOverlay');
  var predQuestion = document.getElementById('predQuestion');
  var predOptions = document.getElementById('predOptions');
  var predResults = document.getElementById('predResults');
  var predTimer = document.getElementById('predTimer');
  var predDot = document.getElementById('predDot');
  var predMeta = document.getElementById('predMeta');
  var predStatusDot = document.getElementById('predStatusDot');
  var predStatusText = document.getElementById('predStatusText');
  var predBody = document.getElementById('predBody');
  var layoutToggleBtn = document.getElementById('layoutToggleBtn');
  var compactToggleBtn = document.getElementById('compactToggleBtn');
  var toastEl = document.getElementById('toast');

  var predProgress = document.getElementById('predProgress');
  var predProgressFill = document.getElementById('predProgressFill');

  // ═══════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════

  var accessToken = null;
  var broadcasterId = null;
  var eventSubSocket = null;
  var currentPrediction = null;
  var timerInterval = null;
  var hideTimer = null;

  var reconnectAttempts = 0;
  var suppressReconnect = false;
  var lastKeepalive = 0;
  var keepaliveTimer = null;
  var KEEPALIVE_TIMEOUT = 15000;

  var testTimers = [];
  var testActive = false;

  var lastPercents = {};
  var seenMessageIds = [];
  var subscriptionErrorShown = false;

  var OUTCOME_COLORS = [
    'var(--c0)', 'var(--c1)', 'var(--c2)', 'var(--c3)', 'var(--c4)',
    'var(--c5)', 'var(--c6)', 'var(--c7)', 'var(--c8)', 'var(--c9)'
  ];

  var debugState = {
    build: BUILD,
    ws: 'idle',
    token: 'none',
    prediction: 'none',
    lastMessage: '',
    reconnects: 0,
    subscriptions: 0,
    mode: displayMode,
    layout: resultsLayout,
    scale: ui.scale,
    safe: ui.safe
  };

  var debugEl = null;

  // ═══════════════════════════════════════════════════════════════
  // HELPERS
  // ═══════════════════════════════════════════════════════════════

  function prefersReducedMotion() {
    return ui.motionOff ||
      (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  }

  function normaliseStatus(status) {
    return String(status || '').toUpperCase();
  }

  function parseTimestamp(value) {
    if (!value) return null;

    if (typeof value === 'number' && Number.isFinite(value)) {
      return value;
    }

    var parsed = new Date(value).getTime();
    return Number.isFinite(parsed) ? parsed : null;
  }

  function isDuplicateNotification(msg) {
    var id = msg && msg.metadata && msg.metadata.message_id;
    if (!id) return false;

    if (seenMessageIds.indexOf(id) !== -1) return true;

    seenMessageIds.push(id);
    if (seenMessageIds.length > 100) seenMessageIds.shift();

    return false;
  }

  function showToast(text, type) {
    if (!toastEl) return;

    toastEl.textContent = text;
    toastEl.className = 'toast' + (type ? ' toast--' + type : '');

    void toastEl.offsetWidth;
    toastEl.classList.add('visible');

    setTimeout(function () {
      toastEl.classList.remove('visible');
    }, 2500);
  }

  function setConnectStatus(text, tone) {
    if (!connectStatus) return;

    connectStatus.textContent = text;
    connectStatus.classList.remove('error', 'success');

    if (tone) connectStatus.classList.add(tone);
  }

  function clearCompactResults() {
    if (!compactResults) return;
    compactResults.classList.remove('visible');
    compactResults.textContent = '';
  }

  function clearHideTimer() {
    if (hideTimer) {
      clearTimeout(hideTimer);
      hideTimer = null;
    }
  }

  function clearTestTimers() {
    for (var i = 0; i < testTimers.length; i++) {
      clearTimeout(testTimers[i]);
    }
    testTimers = [];
  }

  function animatePercentText(el, from, to) {
    if (prefersReducedMotion() || from === to) {
      el.textContent = Math.round(to) + '%';
      return;
    }

    var duration = 500;
    var startTime = performance.now();

    function tick(now) {
      var progress = Math.min(1, (now - startTime) / duration);
      var eased = 1 - Math.pow(1 - progress, 3);
      var value = from + (to - from) * eased;

      el.textContent = Math.round(value) + '%';

      if (progress < 1) requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

  // ═══════════════════════════════════════════════════════════════
  // DEBUG PANEL
  // ═══════════════════════════════════════════════════════════════

  function ensureDebugPanel() {
    if (!ui.debug || debugEl) return;

    debugEl = document.createElement('div');
    debugEl.id = 'sp-debug';
    document.body.appendChild(debugEl);
  }

  function updateDebug(patch) {
    if (patch) {
      Object.keys(patch).forEach(function (key) {
        debugState[key] = patch[key];
      });
    }

    if (!ui.debug) return;

    ensureDebugPanel();
    if (!debugEl) return;

    var lines = [
      '[Stream Predictions]',
      'build: ' + debugState.build,
      'ws: ' + debugState.ws,
      'token: ' + debugState.token,
      'prediction: ' + debugState.prediction,
      'last: ' + (debugState.lastMessage || '—'),
      'reconnects: ' + debugState.reconnects,
      'subs: ' + debugState.subscriptions,
      'mode: ' + debugState.mode,
      'layout: ' + debugState.layout,
      'scale: ' + debugState.scale,
      'safe: ' + debugState.safe
    ];

    debugEl.textContent = lines.join('\n');
  }

  function enableDebug() {
    ui.debug = true;
    docEl.classList.add('debug');
    updateDebug();
  }

  // ═══════════════════════════════════════════════════════════════
  // DISPLAY MODE + LAYOUT + POSITION
  // ═══════════════════════════════════════════════════════════════

  function positionKey() {
    return POS_PREFIX + displayMode;
  }

  function savePosition(data) {
    try {
      localStorage.setItem(positionKey(), JSON.stringify(data));
    } catch (e) {}
  }

  function setOverlayPosition(x, y) {
    if (displayMode === 'vertical') {
      predictionOverlay.style.left = ui.safe + 'px';
      predictionOverlay.style.top = ui.safe + 'px';
      predictionOverlay.style.bottom = '';
      savePosition({ x: ui.safe, y: ui.safe });
      return;
    }

    if (displayMode === 'compact') {
      predictionOverlay.style.left = ui.safe + 'px';
      predictionOverlay.style.top = 'auto';
      predictionOverlay.style.bottom = ui.safe + 'px';
      savePosition({ x: ui.safe, bottom: ui.safe });
      return;
    }

    var w = (predictionOverlay.offsetWidth || 560) * ui.scale;
    var h = (predictionOverlay.offsetHeight || 300) * ui.scale;

    x = Math.max(ui.safe, Math.min(window.innerWidth - w - ui.safe, x));
    y = Math.max(ui.safe, Math.min(window.innerHeight - h - ui.safe, y));

    predictionOverlay.style.left = x + 'px';
    predictionOverlay.style.top = y + 'px';
    predictionOverlay.style.bottom = '';

    savePosition({ x: x, y: y });
  }

  function restoreOverlayPosition() {
    if (displayMode !== 'full') {
      setOverlayPosition(ui.safe, ui.safe);
      return;
    }

    try {
      var saved = JSON.parse(localStorage.getItem(positionKey()) || 'null');
      if (saved && typeof saved.x === 'number' && typeof saved.y === 'number') {
        setOverlayPosition(saved.x, saved.y);
        return;
      }
    } catch (e) {}

    var defaultX = Math.max(ui.safe, (window.innerWidth - 560 * ui.scale) / 2);
    var defaultY = Math.max(ui.safe, window.innerHeight - 400 * ui.scale - ui.safe);

    setOverlayPosition(defaultX, defaultY);
  }

  function applyDisplayMode(mode) {
    displayMode = mode;

    predictionOverlay.classList.toggle('vertical', mode === 'vertical');
    predictionOverlay.classList.toggle('compact', mode === 'compact');

    try {
      localStorage.setItem(MODE_KEY, mode);
    } catch (e) {}

    restoreOverlayPosition();
    updateDebug({ mode: mode });
  }

  function cycleDisplayMode() {
    if (displayMode === 'full') applyDisplayMode('vertical');
    else applyDisplayMode('full');

    showToast(displayMode === 'full' ? 'Full mode' : 'Vertical mode');
  }

  function applyLayout(layout) {
    resultsLayout = layout;

    if (predBody) predBody.classList.toggle('layout-right', layout === 'right');
    if (layoutToggleBtn) layoutToggleBtn.classList.toggle('active', layout === 'right');

    try {
      localStorage.setItem(LAYOUT_KEY, layout);
    } catch (e) {}

    updateDebug({ layout: layout });
  }

  function toggleLayout() {
    applyLayout(resultsLayout === 'right' ? 'bottom' : 'right');
    showToast(resultsLayout === 'right' ? 'Results: right' : 'Results: below');
  }

  // ═══════════════════════════════════════════════════════════════
  // AUTH
  // ═══════════════════════════════════════════════════════════════

  function initAuth() {
    if (didReset) {
      setConnectStatus('Reset complete — connect Twitch', 'success');
      showToast('Overlay reset');
      updateDebug({ token: 'cleared' });
    }

    if (!CLIENT_ID) {
      setConnectStatus('No Client ID configured — add ?client_id=YOUR_CLIENT_ID', 'error');
      connectBtn.removeAttribute('href');
      updateDebug({ token: 'missing client id' });

      connectBtn.addEventListener('click', function (e) {
        e.preventDefault();
        setConnectStatus('No Client ID configured', 'error');
      });

      return;
    }

    var authUrl =
      'https://id.twitch.tv/oauth2/authorize?client_id=' + encodeURIComponent(CLIENT_ID) +
      '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
      '&response_type=token' +
      '&scope=' + encodeURIComponent(SCOPES);

    connectBtn.setAttribute('href', authUrl);

    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);

    if (params.get('access_token')) {
      accessToken = params.get('access_token');

      var expiresIn = parseInt(params.get('expires_in'), 10) || 0;

      try {
        localStorage.setItem(TOKEN_STORAGE_KEY, accessToken);

        if (expiresIn > 0) {
          localStorage.setItem(TOKEN_EXPIRY_KEY, String(Date.now() + expiresIn * 1000));
        } else {
          localStorage.removeItem(TOKEN_EXPIRY_KEY);
        }
      } catch (e) {}

      try {
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      } catch (e) {}

      setConnectStatus('Connected! Loading…', 'success');
      updateDebug({ token: 'received' });

      processToken(accessToken);
      return;
    }

    try {
      var stored = localStorage.getItem(TOKEN_STORAGE_KEY);
      var expiry = parseInt(localStorage.getItem(TOKEN_EXPIRY_KEY) || '0', 10);

      if (stored) {
        if (expiry && Date.now() >= expiry - 60000) {
          localStorage.removeItem(TOKEN_STORAGE_KEY);
          localStorage.removeItem(TOKEN_EXPIRY_KEY);

          setConnectStatus('Session expired — reconnect', 'error');
          updateDebug({ token: 'expired' });
          return;
        }

        accessToken = stored;
        setConnectStatus('Restoring connection…');
        updateDebug({ token: 'stored' });

        processToken(accessToken);
        return;
      }
    } catch (e) {}

    if (!didReset) {
      setConnectStatus('Click to connect your Twitch account');
    }

    updateDebug({ token: 'none' });
  }

  async function processToken(token) {
    accessToken = token;
    connectBtn.classList.add('loading');

    try {
      var resp = await fetch('https://api.twitch.tv/helix/users', {
        headers: {
          'Client-ID': CLIENT_ID,
          'Authorization': 'Bearer ' + token
        }
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      var data = await resp.json();

      if (data.data && data.data.length > 0) {
        broadcasterId = data.data[0].id;

        connectScreen.classList.add('hidden');
        connectBtn.classList.remove('loading');

        if (floatTestBtn) floatTestBtn.classList.add('visible');

        showToast('Connected to Twitch', 'success');

        reconnectAttempts = 0;

        updateDebug({
          token: 'valid',
          ws: 'connecting'
        });

        subscribeToPredictions();
        fetchActivePrediction();
      } else {
        throw new Error('No user data');
      }
    } catch (e) {
      connectScreen.classList.remove('hidden');
      connectBtn.classList.remove('loading');

      if (floatTestBtn) floatTestBtn.classList.remove('visible');

      setConnectStatus(
        'Connection failed: ' + e.message + ' — click Connect Twitch to retry',
        'error'
      );

      updateDebug({
        token: 'invalid',
        ws: 'disconnected'
      });

      try {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        localStorage.removeItem(TOKEN_EXPIRY_KEY);
      } catch (err) {}

      accessToken = null;
      broadcasterId = null;
    }
  }

  function disconnect() {
    suppressReconnect = true;

    stopKeepaliveWatchdog();

    if (eventSubSocket) {
      try {
        eventSubSocket.close();
      } catch (e) {}
      eventSubSocket = null;
    }

    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    clearHideTimer();
    clearTestTimers();
    clearCompactResults();

    testActive = false;
    accessToken = null;
    broadcasterId = null;
    currentPrediction = null;
    lastPercents = {};

    predictionOverlay.classList.remove('visible', 'slide-out');
    connectScreen.classList.remove('hidden');

    if (floatTestBtn) floatTestBtn.classList.remove('visible');

    try {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      localStorage.removeItem(TOKEN_EXPIRY_KEY);
    } catch (e) {}

    setConnectStatus('Disconnected');
    updateDebug({
      ws: 'disconnected',
      token: 'cleared',
      prediction: 'none',
      subscriptions: 0
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // EVENTSUB WEBSOCKET
  // ═══════════════════════════════════════════════════════════════

  function subscribeToPredictions() {
    connectEventSub('wss://eventsub.wss.twitch.tv/ws');
  }

  function connectEventSub(url) {
    if (eventSubSocket && eventSubSocket.readyState !== WebSocket.CLOSED) {
      suppressReconnect = true;

      try {
        eventSubSocket.close();
      } catch (e) {}
    }

    updateDebug({ ws: 'connecting' });

    eventSubSocket = new WebSocket(url);
    lastKeepalive = Date.now();

    startKeepaliveWatchdog();

    eventSubSocket.onopen = function () {
      updateDebug({ ws: 'connected' });
    };

    eventSubSocket.onmessage = handleEventSubMessage;

    eventSubSocket.onerror = function (e) {
      console.error('EventSub WebSocket error:', e);
      updateDebug({ ws: 'error' });
    };

    eventSubSocket.onclose = function () {
      stopKeepaliveWatchdog();
      updateDebug({ ws: 'closed' });

      if (suppressReconnect) {
        suppressReconnect = false;
        return;
      }

      scheduleReconnect();
    };
  }

  function scheduleReconnect() {
    if (!accessToken || !broadcasterId) return;

    var delay = Math.min(30000, 1000 * Math.pow(2, reconnectAttempts));
    reconnectAttempts++;

    updateDebug({
      reconnects: reconnectAttempts,
      ws: 'reconnecting in ' + Math.round(delay / 1000) + 's'
    });

    setTimeout(function () {
      if (accessToken && broadcasterId) {
        subscribeToPredictions();
      }
    }, delay);
  }

  function startKeepaliveWatchdog() {
    stopKeepaliveWatchdog();

    keepaliveTimer = setInterval(function () {
      if (!eventSubSocket || eventSubSocket.readyState !== WebSocket.OPEN) return;

      if (Date.now() - lastKeepalive > KEEPALIVE_TIMEOUT) {
        console.warn('EventSub keepalive timeout — reconnecting');

        updateDebug({ ws: 'keepalive timeout' });

        suppressReconnect = true;

        try {
          eventSubSocket.close();
        } catch (e) {}

        scheduleReconnect();
      }
    }, 5000);
  }

  function stopKeepaliveWatchdog() {
    if (keepaliveTimer) {
      clearInterval(keepaliveTimer);
      keepaliveTimer = null;
    }
  }

  function handleEventSubMessage(event) {
    var msg;

    try {
      msg = JSON.parse(event.data);
    } catch (e) {
      return;
    }

    lastKeepalive = Date.now();

    if (!msg.metadata) return;

    var messageType = msg.metadata.message_type;

    updateDebug({ lastMessage: messageType });

    if (messageType === 'session_welcome') {
      reconnectAttempts = 0;
      subscriptionErrorShown = false;

      var sessionId = msg.payload.session.id;
      console.log('EventSub session:', sessionId);

      updateDebug({
        ws: 'connected · welcome',
        reconnects: 0
      });

      createSubscriptions(sessionId);
      return;
    }

    if (messageType === 'session_keepalive') {
      return;
    }

    if (messageType === 'notification') {
      if (isDuplicateNotification(msg)) {
        console.log('Duplicate notification ignored:', msg.metadata.message_id);
        return;
      }

      var subType = msg.metadata.subscription_type;
      var payload = msg.payload.event;

      updateDebug({ lastMessage: 'notification:' + subType });

      if (subType === 'channel.prediction.begin') {
        onPredictionBegin(payload);
      } else if (subType === 'channel.prediction.progress') {
        onPredictionProgress(payload);
      } else if (subType === 'channel.prediction.lock') {
        onPredictionLock(payload);
      } else if (subType === 'channel.prediction.end') {
        onPredictionEnd(payload);
      }

      return;
    }

    if (messageType === 'session_reconnect') {
      var newUrl = msg.payload.session.reconnect_url;
      console.log('EventSub reconnect requested:', newUrl);

      updateDebug({ ws: 'reconnect requested' });

      connectEventSub(newUrl);
      return;
    }

    if (messageType === 'revocation') {
      console.warn('EventSub subscription revoked:', msg);

      showToast('Subscription revoked — reconnect required', 'error');

      updateDebug({
        lastMessage: 'revocation',
        subscriptions: 0
      });

      disconnect();
      return;
    }
  }

  async function createSubscriptions(sessionId) {
    var subscriptionTypes = [
      {
        type: 'channel.prediction.begin',
        version: '1',
        condition: { broadcaster_user_id: broadcasterId }
      },
      {
        type: 'channel.prediction.progress',
        version: '1',
        condition: { broadcaster_user_id: broadcasterId }
      },
      {
        type: 'channel.prediction.lock',
        version: '1',
        condition: { broadcaster_user_id: broadcasterId }
      },
      {
        type: 'channel.prediction.end',
        version: '1',
        condition: { broadcaster_user_id: broadcasterId }
      }
    ];

    var okCount = 0;

    for (var i = 0; i < subscriptionTypes.length; i++) {
      var sub = subscriptionTypes[i];

      try {
        var resp = await fetch('https://api.twitch.tv/helix/eventsub/subscriptions', {
          method: 'POST',
          headers: {
            'Client-ID': CLIENT_ID,
            'Authorization': 'Bearer ' + accessToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            type: sub.type,
            version: sub.version,
            condition: sub.condition,
            transport: {
              method: 'websocket',
              session_id: sessionId
            }
          })
        });

        if (resp.status === 401) {
          console.warn('Twitch token invalid during subscription creation');
          disconnect();
          return;
        }

        if (resp.ok) {
          okCount++;
          console.log('Subscribed to ' + sub.type);
          updateDebug({ subscriptions: okCount });
        } else {
          var err = await resp.json().catch(function () {
            return {};
          });

          console.warn(
            'Subscription to ' + sub.type + ' failed:',
            err.message || resp.status
          );

          if (!subscriptionErrorShown) {
            subscriptionErrorShown = true;
            showToast('Subscription failed — check console', 'error');
          }
        }
      } catch (e) {
        console.warn('Subscription to ' + sub.type + ' error:', e.message);

        if (!subscriptionErrorShown) {
          subscriptionErrorShown = true;
          showToast('Subscription error — check console', 'error');
        }
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // FETCH ACTIVE PREDICTION
  // ═══════════════════════════════════════════════════════════════

  async function fetchActivePrediction() {
    try {
      var resp = await fetch(
        'https://api.twitch.tv/helix/predictions?broadcaster_id=' + broadcasterId,
        {
          headers: {
            'Client-ID': CLIENT_ID,
            'Authorization': 'Bearer ' + accessToken
          }
        }
      );

      if (resp.status === 401) {
        disconnect();
        return;
      }

      if (!resp.ok) return;

      var data = await resp.json();

      if (data.data && data.data.length > 0) {
        for (var i = 0; i < data.data.length; i++) {
          var pred = data.data[i];

          if (pred.status === 'ACTIVE' || pred.status === 'LOCKED') {
            onPredictionBegin(pred);

            if (pred.status === 'LOCKED') {
              onPredictionLock(pred);
            }

            break;
          }
        }
      }
    } catch (e) {
      console.warn('Could not fetch active prediction:', e.message);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PREDICTION EVENT HANDLERS
  // ═══════════════════════════════════════════════════════════════

  function onPredictionBegin(payload) {
    clearHideTimer();
    clearCompactResults();

    lastPercents = {};

    currentPrediction = {
      id: payload.id,
      title: payload.title,
      outcomes: payload.outcomes || [],
      status: 'ACTIVE',
      lockedAt: null,
      startsAt: parseTimestamp(payload.startsAt || payload.created_at) || Date.now(),
      endsAt: parseTimestamp(payload.endsAt || payload.ends_at),
      winningOutcomeId: null
    };

    updateDebug({ prediction: 'active · ' + shortId(payload.id) });

    renderPrediction();
    startTimer();
  }

  function onPredictionProgress(payload) {
    if (!currentPrediction || currentPrediction.id !== payload.id) {
      onPredictionBegin(payload);
      return;
    }

    if (currentPrediction.status !== 'ACTIVE') return;

    currentPrediction.outcomes = payload.outcomes || currentPrediction.outcomes;

    if (payload.ends_at) {
      currentPrediction.endsAt = parseTimestamp(payload.ends_at);
    }

    renderPrediction();
  }

  function onPredictionLock(payload) {
    if (!currentPrediction || currentPrediction.id !== payload.id) return;

    if (
      currentPrediction.status === 'RESOLVED' ||
      currentPrediction.status === 'CANCELED'
    ) {
      return;
    }

    currentPrediction.status = 'LOCKED';
    currentPrediction.lockedAt = payload.locked_at;

    updateDebug({ prediction: 'locked · ' + shortId(payload.id) });

    renderPrediction();
  }

  function onPredictionEnd(payload) {
    if (!currentPrediction || currentPrediction.id !== payload.id) return;

    var status = normaliseStatus(payload.status);

    currentPrediction.status = status;
    currentPrediction.winningOutcomeId = payload.winning_outcome_id || null;

    if (payload.outcomes) {
      currentPrediction.outcomes = payload.outcomes;
    }

    if (status === 'RESOLVED' && payload.winning_outcome_id) {
      for (var i = 0; i < currentPrediction.outcomes.length; i++) {
        currentPrediction.outcomes[i].isWinner =
          currentPrediction.outcomes[i].id === payload.winning_outcome_id;
      }
    }

    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    updateDebug({ prediction: status.toLowerCase() + ' · ' + shortId(payload.id) });

    renderPrediction();

    if (status === 'RESOLVED') {
      spawnCelebration();

      if (displayMode !== 'full') {
        setTimeout(showCompactResults, 100);
      }
    }

    scheduleOverlayHide(status === 'RESOLVED' ? 15000 : 8000);
  }

  function scheduleOverlayHide(delay) {
    clearHideTimer();

    var predictionId = currentPrediction ? currentPrediction.id : null;

    hideTimer = setTimeout(function () {
      if (!currentPrediction || currentPrediction.id !== predictionId) return;

      clearCompactResults();

      predictionOverlay.classList.add('slide-out');

      setTimeout(function () {
        predictionOverlay.classList.remove('visible', 'slide-out');
        currentPrediction = null;
        lastPercents = {};

        updateDebug({ prediction: 'none' });
      }, 500);
    }, delay);
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════

  function renderPrediction() {
    if (!currentPrediction) {
      predictionOverlay.classList.remove('visible');
      return;
    }

    predictionOverlay.classList.add('visible');
    predictionOverlay.classList.remove('hidden');

    var status = currentPrediction.status;

    predictionOverlay.setAttribute('data-status', status.toLowerCase());
    predQuestion.textContent = currentPrediction.title || '—';

    var isLocked = status === 'LOCKED';
    var isResolved = status === 'RESOLVED';
    var isCanceled = status === 'CANCELED';
    var isEnded = isResolved || isCanceled;

    predDot.className = 'pred-dot';
    predStatusDot.className = 'pred-status-dot';

    if (isCanceled) {
      predDot.classList.add('canceled');
      predStatusDot.classList.add('canceled');
      predStatusText.textContent = 'Canceled';
      predTimer.classList.add('ended');
    } else if (isEnded) {
      predDot.classList.add('ended');
      predStatusDot.classList.add('ended');
      predStatusText.textContent = 'Ended';
      predTimer.classList.add('ended');
    } else if (isLocked) {
      predDot.classList.add('locked');
      predStatusDot.classList.add('locked');
      predStatusText.textContent = 'Locked';
      predTimer.classList.remove('ended');
    } else {
      predStatusDot.classList.add('active');
      predStatusText.textContent = 'Active';
      predTimer.classList.remove('ended');
    }

    var totalPoints = 0;

    for (var i = 0; i < currentPrediction.outcomes.length; i++) {
      totalPoints += parseInt(currentPrediction.outcomes[i].channel_points) || 0;
    }

    var statusLabel = 'Prediction Active';

    if (isResolved) statusLabel = 'Prediction Resolved';
    else if (isCanceled) statusLabel = 'Prediction Canceled';
    else if (isLocked) statusLabel = 'Prediction Locked';

    predMeta.textContent =
      statusLabel +
      (totalPoints > 0 ? ' · ' + totalPoints.toLocaleString() + ' pts' : '');

    var leadingIndex = -1;

    if (!isEnded) {
      var maxPts = -1;
      var tie = false;

      for (var l = 0; l < currentPrediction.outcomes.length; l++) {
        var lpts = parseInt(currentPrediction.outcomes[l].channel_points) || 0;

        if (lpts > maxPts) {
          maxPts = lpts;
          leadingIndex = l;
          tie = false;
        } else if (lpts === maxPts && maxPts > 0) {
          tie = true;
        }
      }

      if (tie) leadingIndex = -1;
    }

    var existingOptions = predOptions.querySelectorAll('.pred-option');

    var needsRebuild =
      existingOptions.length !== currentPrediction.outcomes.length;

    if (!needsRebuild) {
      for (var c = 0; c < currentPrediction.outcomes.length; c++) {
        if (
          !existingOptions[c] ||
          existingOptions[c].getAttribute('data-id') !== String(currentPrediction.outcomes[c].id)
        ) {
          needsRebuild = true;
          break;
        }
      }
    }

    if (needsRebuild) {
      predOptions.textContent = '';

      for (var a = 0; a < currentPrediction.outcomes.length; a++) {
        var outcome = currentPrediction.outcomes[a];
        var color = OUTCOME_COLORS[a % OUTCOME_COLORS.length];

        var optionEl = document.createElement('div');
        optionEl.className = 'pred-option';
        optionEl.setAttribute('data-id', String(outcome.id));
        optionEl.style.animationDelay = a * 0.08 + 's';

        var bar = document.createElement('div');
        bar.className = 'pred-option-bar';
        bar.style.background = color;
        bar.style.opacity = '0.12';
        bar.style.transform = 'scaleX(0)';

        var content = document.createElement('div');
        content.className = 'pred-option-content';

        var colorDot = document.createElement('div');
        colorDot.className = 'pred-option-color';
        colorDot.style.background = color;

        var text = document.createElement('div');
        text.className = 'pred-option-text';

        var badge = document.createElement('span');
        badge.className = 'pred-winner-badge';
        badge.textContent = 'Winner';

        var pct = document.createElement('div');
        pct.className = 'pred-option-pct';
        pct.textContent = '0%';

        content.appendChild(colorDot);
        content.appendChild(text);
        content.appendChild(badge);
        content.appendChild(pct);

        var top = document.createElement('div');
        top.className = 'pred-top-contributor';

        optionEl.appendChild(bar);
        optionEl.appendChild(content);
        optionEl.appendChild(top);

        predOptions.appendChild(optionEl);
      }

      existingOptions = predOptions.querySelectorAll('.pred-option');
    }

    var nextPercents = {};

    for (var b = 0; b < currentPrediction.outcomes.length; b++) {
      var outcome2 = currentPrediction.outcomes[b];
      var pts = parseInt(outcome2.channel_points) || 0;
      var pctValue = totalPoints > 0 ? Math.round((pts / totalPoints) * 100) : 0;
      var baseColor = OUTCOME_COLORS[b % OUTCOME_COLORS.length];
      var isWinner = outcome2.isWinner === true;
      var isLeading = b === leadingIndex;

      nextPercents[outcome2.id] = pctValue;

      var topContributor = null;

      if (!isEnded && outcome2.top_predictors && outcome2.top_predictors.length > 0) {
        topContributor = outcome2.top_predictors[0];

        for (var d = 1; d < outcome2.top_predictors.length; d++) {
          if (
            (outcome2.top_predictors[d].channel_points_used || 0) >
            (topContributor.channel_points_used || 0)
          ) {
            topContributor = outcome2.top_predictors[d];
          }
        }
      }

      var option = existingOptions[b];
      if (!option) continue;

      var barEl = option.querySelector('.pred-option-bar');
      barEl.style.background = baseColor;
      barEl.style.transform = 'scaleX(' + pctValue / 100 + ')';

      var colorEl = option.querySelector('.pred-option-color');
      colorEl.style.background = baseColor;
      colorEl.style.boxShadow = isLeading ? '0 0 8px ' + baseColor : '';

      option.querySelector('.pred-option-text').textContent = outcome2.title || '—';

      var pctEl = option.querySelector('.pred-option-pct');
      var fromPct = typeof lastPercents[outcome2.id] === 'number'
        ? lastPercents[outcome2.id]
        : 0;

      animatePercentText(pctEl, fromPct, pctValue);

      option.classList.toggle('winner', isWinner);
      option.classList.toggle('leading', isLeading);

      var tcEl = option.querySelector('.pred-top-contributor');

      if (topContributor && topContributor.user_name && !isEnded) {
        var contribPoints = parseInt(topContributor.channel_points_used) || 0;

        tcEl.textContent = '';

        var nameSpan = document.createElement('span');
        nameSpan.className = 'tc-name';
        nameSpan.textContent = topContributor.user_name;

        tcEl.appendChild(nameSpan);
        tcEl.appendChild(
          document.createTextNode(' bet ' + contribPoints.toLocaleString() + ' pts')
        );

        tcEl.classList.add('visible');
      } else {
        tcEl.classList.remove('visible');
        tcEl.textContent = '';
      }
    }

    lastPercents = nextPercents;

    renderResults(isEnded, isResolved);
    updateTimerDisplay();
  }

  function renderResults(isEnded, isResolved) {
    if (!isEnded || !isResolved || displayMode !== 'full') {
      predResults.classList.remove('visible');
      predResults.textContent = '';
      return;
    }

    var allPredictors = [];

    for (var i = 0; i < currentPrediction.outcomes.length; i++) {
      var outcome = currentPrediction.outcomes[i];
      var outcomeColor = OUTCOME_COLORS[i % OUTCOME_COLORS.length];

      if (outcome.top_predictors) {
        for (var j = 0; j < outcome.top_predictors.length; j++) {
          var pred = outcome.top_predictors[j];

          allPredictors.push({
            name: pred.user_name || 'Unknown',
            won: parseInt(pred.channel_points_won) || 0,
            used: parseInt(pred.channel_points_used) || 0,
            color: outcomeColor,
            isWinner: outcome.isWinner === true
          });
        }
      }
    }

    allPredictors.sort(function (a, b) {
      return b.won - a.won;
    });

    var showCount = Math.min(8, allPredictors.length);

    predResults.textContent = '';

    for (var k = 0; k < showCount; k++) {
      var p = allPredictors[k];

      var row = document.createElement('div');
      row.className = 'pred-result-row';
      row.style.animationDelay = k * 0.06 + 's';

      var dot = document.createElement('div');
      dot.className = 'pred-result-color';
      dot.style.background = p.color;

      var name = document.createElement('div');
      name.className = 'pred-result-name';
      name.textContent = p.name;

      var amount = document.createElement('div');
      amount.className = 'pred-result-amount ' + (p.isWinner ? 'won' : 'lost');

      if (p.isWinner) {
        amount.textContent = '+' + p.won.toLocaleString() + ' pts';
      } else {
        amount.textContent = '\u2212' + p.used.toLocaleString() + ' pts';
      }

      row.appendChild(dot);
      row.appendChild(name);
      row.appendChild(amount);

      predResults.appendChild(row);
    }

    predResults.classList.add('visible');
  }

  // ═══════════════════════════════════════════════════════════════
  // TIMER + PROGRESS
  // ═══════════════════════════════════════════════════════════════

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);

    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }

  function updateTimerDisplay() {
    if (!currentPrediction || !currentPrediction.endsAt) {
      predTimer.textContent = '—';
      updateProgress();
      return;
    }

    var status = currentPrediction.status;
    var isLocked = status === 'LOCKED';
    var isResolved = status === 'RESOLVED';
    var isCanceled = status === 'CANCELED';
    var isEnded = isResolved || isCanceled;

    if (isCanceled) {
      predTimer.textContent = 'Canceled';
      predTimer.classList.remove('urgent');
      updateProgress();
      return;
    }

    if (isLocked || isEnded) {
      predTimer.textContent = isEnded ? 'Done' : 'Locked';
      predTimer.classList.remove('urgent');
      updateProgress();
      return;
    }

    var now = Date.now();
    var ends = currentPrediction.endsAt;
    var remaining = Math.max(0, Math.floor((ends - now) / 1000));

    var min = Math.floor(remaining / 60);
    var sec = remaining % 60;

    predTimer.textContent =
      (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;

    predTimer.classList.toggle('urgent', remaining <= 30 && remaining > 0);

    updateProgress();
  }

  function updateProgress() {
    if (!predProgress || !predProgressFill) return;

    if (!currentPrediction) {
      predProgress.classList.remove('visible');
      predProgressFill.style.width = '0%';
      predProgressFill.classList.remove('urgent');
      return;
    }

    var status = currentPrediction.status;

    if (status === 'CANCELED') {
      predProgress.classList.add('visible');
      predProgressFill.style.width = '0%';
      predProgressFill.classList.remove('urgent');
      return;
    }

    if (status === 'LOCKED' || status === 'RESOLVED') {
      predProgress.classList.add('visible');
      predProgressFill.style.width = '100%';
      predProgressFill.classList.remove('urgent');
      return;
    }

    if (status === 'ACTIVE' && currentPrediction.startsAt && currentPrediction.endsAt) {
      var total = currentPrediction.endsAt - currentPrediction.startsAt;
      var remaining = currentPrediction.endsAt - Date.now();

      if (total <= 0) {
        predProgress.classList.add('visible');
        predProgressFill.style.width = '0%';
        predProgressFill.classList.remove('urgent');
        return;
      }

      var pct = clamp((remaining / total) * 100, 0, 100);

      predProgress.classList.add('visible');
      predProgressFill.style.width = pct + '%';
      predProgressFill.classList.toggle('urgent', remaining <= 30000 && remaining > 0);

      return;
    }

    predProgress.classList.remove('visible');
    predProgressFill.style.width = '0%';
    predProgressFill.classList.remove('urgent');
  }

  // ═══════════════════════════════════════════════════════════════
  // COMPACT FLOATING RESULTS
  // ═══════════════════════════════════════════════════════════════

  function showCompactResults() {
    if (!currentPrediction) return;
    if (!compactResults) return;
    if (currentPrediction.status !== 'RESOLVED') return;

    var overlayRect = predictionOverlay.getBoundingClientRect();

    if (displayMode === 'vertical') {
      compactResults.style.left = overlayRect.right + 8 + 'px';
      compactResults.style.width = '260px';
      compactResults.style.bottom = '';
      compactResults.style.top = Math.max(12, overlayRect.top + 12) + 'px';
    } else {
      compactResults.style.left = overlayRect.left + 'px';
      compactResults.style.width = overlayRect.width + 'px';
      compactResults.style.bottom =
        window.innerHeight - overlayRect.top + 6 + 'px';
      compactResults.style.top = '';
    }

    var allPredictors = [];

    for (var i = 0; i < currentPrediction.outcomes.length; i++) {
      var outcome = currentPrediction.outcomes[i];
      var outcomeColor = OUTCOME_COLORS[i % OUTCOME_COLORS.length];

      if (outcome.top_predictors && outcome.top_predictors.length > 0) {
        for (var j = 0; j < outcome.top_predictors.length; j++) {
          var pred = outcome.top_predictors[j];

          allPredictors.push({
            name: pred.user_name || 'Unknown',
            won: parseInt(pred.channel_points_won) || 0,
            used: parseInt(pred.channel_points_used) || 0,
            color: outcomeColor,
            isWinner: outcome.isWinner === true
          });
        }
      }
    }

    if (allPredictors.length === 0) {
      for (var k = 0; k < currentPrediction.outcomes.length; k++) {
        var outcome2 = currentPrediction.outcomes[k];
        var outcomeColor2 = OUTCOME_COLORS[k % OUTCOME_COLORS.length];

        allPredictors.push({
          name: outcome2.title || 'Unknown',
          won: parseInt(outcome2.channel_points) || 0,
          used: parseInt(outcome2.channel_points) || 0,
          color: outcomeColor2,
          isWinner: outcome2.isWinner === true
        });
      }
    }

    allPredictors.sort(function (a, b) {
      if (a.isWinner && !b.isWinner) return -1;
      if (!a.isWinner && b.isWinner) return 1;
      return b.won - a.won;
    });

    var showCount = Math.min(6, allPredictors.length);

    compactResults.textContent = '';

    for (var m = 0; m < showCount; m++) {
      var p = allPredictors[m];

      var item = document.createElement('div');
      item.className = 'compact-result-item';

      var dot = document.createElement('div');
      dot.className = 'compact-result-dot';
      dot.style.background = p.color;

      var name = document.createElement('span');
      name.className = 'compact-result-name';
      name.textContent = p.name;

      var amount = document.createElement('span');
      amount.className = 'compact-result-amount ' + (p.isWinner ? 'won' : 'lost');

      if (p.isWinner) {
        amount.textContent = '+' + p.won.toLocaleString();
      } else {
        amount.textContent = '\u2212' + p.used.toLocaleString();
      }

      item.appendChild(dot);
      item.appendChild(name);
      item.appendChild(amount);

      compactResults.appendChild(item);

      (function (el, delay) {
        setTimeout(function () {
          el.classList.add('show');
        }, delay * 100 + 50);
      })(item, m);
    }

    compactResults.classList.add('visible');
  }

  // ═══════════════════════════════════════════════════════════════
  // CELEBRATION PARTICLES
  // ═══════════════════════════════════════════════════════════════

  function spawnCelebration() {
    if (prefersReducedMotion()) return;

    var winnerEl = predictionOverlay.querySelector('.pred-option.winner');
    if (!winnerEl) return;

    var rect = winnerEl.getBoundingClientRect();
    var centerX = rect.left + rect.width / 2;
    var centerY = rect.top + rect.height / 2;

    var colors = ['#d4a853', '#e8c87a', '#9bbf9b', '#d49274', '#d9a3b8'];
    var particleCount = displayMode === 'full' ? 30 : 18;

    for (var i = 0; i < particleCount; i++) {
      var p = document.createElement('div');
      p.className = 'celebration-particle';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.left = centerX + 'px';
      p.style.top = centerY + 'px';
      p.style.boxShadow = '0 0 6px ' + p.style.background;

      document.body.appendChild(p);

      var angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.5;
      var velocity = 80 + Math.random() * 120;
      var vx = Math.cos(angle) * velocity;
      var vy = Math.sin(angle) * velocity - 40;
      var rotation = Math.random() * 720;
      var duration = 800 + Math.random() * 600;
      var startTime = Date.now();

      (function (particle, vx, vy, rotation, duration, startTime) {
        function animate() {
          var elapsed = Date.now() - startTime;
          var progress = elapsed / duration;

          if (progress >= 1) {
            particle.remove();
            return;
          }

          var x = vx * progress;
          var y = vy * progress + 0.5 * 200 * progress * progress;
          var r = rotation * progress;
          var opacity = 1 - progress;

          particle.style.transform =
            'translate(' + x + 'px, ' + y + 'px) rotate(' + r + 'deg)';
          particle.style.opacity = opacity;

          requestAnimationFrame(animate);
        }

        animate();
      })(p, vx, vy, rotation, duration, startTime);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // TEST PREDICTION
  // ═══════════════════════════════════════════════════════════════

  function makeTestOutcomes() {
    var outcomes = [
      { id: 'test-a', title: 'Pobot', channel_points: 0, top_predictors: [] },
      { id: 'test-b', title: 'Prestler', channel_points: 0, top_predictors: [] },
      { id: 'test-c', title: 'Cultural Pic', channel_points: 0, top_predictors: [] },
      { id: 'test-d', title: 'Pisc', channel_points: 0, top_predictors: [] }
    ];

    var fakeNames = [
      'FizzyCait',
      'BreadSanta',
      'HarryHardy',
      'grgrsmth',
      'Albrot',
      'JosieRustle',
      'AngelInterceptor',
      'AliDooLalli'
    ];

    for (var i = 0; i < outcomes.length; i++) {
      var numPredictors = 2 + Math.floor(Math.random() * 3);

      for (var j = 0; j < numPredictors; j++) {
        var pts = 500 + Math.floor(Math.random() * 5000);

        outcomes[i].top_predictors.push({
          user_id: 'test-' + i + '-' + j,
          user_name: fakeNames[Math.floor(Math.random() * fakeNames.length)],
          channel_points_used: pts,
          channel_points_won: 0
        });
      }
    }

    return outcomes;
  }

  function seedTestPoints(outcomes, base) {
    for (var i = 0; i < outcomes.length; i++) {
      var addPts = base + Math.floor(Math.random() * base);
      outcomes[i].channel_points += addPts;

      if (outcomes[i].top_predictors.length > 0) {
        outcomes[i].top_predictors[0].channel_points_used += Math.floor(addPts * 0.4);
      }
    }
  }

  function resolveTestOutcomes(outcomes) {
    var winnerIdx = 0;
    var maxPts = -1;

    for (var i = 0; i < outcomes.length; i++) {
      if (outcomes[i].channel_points > maxPts) {
        maxPts = outcomes[i].channel_points;
        winnerIdx = i;
      }
    }

    var totalLosingPoints = 0;

    for (var k = 0; k < outcomes.length; k++) {
      if (k !== winnerIdx) totalLosingPoints += outcomes[k].channel_points;
    }

    for (var m = 0; m < outcomes.length; m++) {
      outcomes[m].isWinner = m === winnerIdx;

      for (var n = 0; n < outcomes[m].top_predictors.length; n++) {
        var used = outcomes[m].top_predictors[n].channel_points_used;

        if (m === winnerIdx) {
          var share =
            totalLosingPoints > 0
              ? Math.round((used / outcomes[m].channel_points) * totalLosingPoints)
              : 0;

          outcomes[m].top_predictors[n].channel_points_won = used + share;
        } else {
          outcomes[m].top_predictors[n].channel_points_won = 0;
        }
      }
    }

    return outcomes[winnerIdx];
  }

  function hideTestOverlay(delay) {
    var id = currentPrediction ? currentPrediction.id : null;

    testTimers.push(
      setTimeout(function () {
        if (currentPrediction && currentPrediction.id === id) {
          clearCompactResults();

          predictionOverlay.classList.add('slide-out');

          setTimeout(function () {
            predictionOverlay.classList.remove('visible', 'slide-out');
            currentPrediction = null;
            lastPercents = {};
            updateDebug({ prediction: 'none' });
          }, 500);
        }

        testActive = false;
      }, delay)
    );
  }

  function runTestPrediction(mode) {
    mode = mode || 'active';

    if (testActive) return;

    testActive = true;

    clearTestTimers();
    clearHideTimer();
    clearCompactResults();

    lastPercents = {};

    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    connectScreen.classList.add('hidden');

    var outcomes = makeTestOutcomes();
    var id = 'test-prediction-' + Date.now();

    var beginPayload = {
      id: id,
      title: 'What will Pete draw first tonight?',
      outcomes: outcomes,
      status: 'ACTIVE',
      created_at: new Date().toISOString(),
      ends_at: new Date(Date.now() + (mode === 'active' ? 30000 : 12000)).toISOString()
    };

    onPredictionBegin(beginPayload);

    if (mode === 'canceled') {
      testTimers.push(
        setTimeout(function () {
          onPredictionEnd({
            id: id,
            title: beginPayload.title,
            outcomes: outcomes,
            status: 'CANCELED'
          });

          showToast('Test prediction canceled');
          testActive = false;
        }, 1500)
      );

      return;
    }

    if (mode === 'resolved') {
      seedTestPoints(outcomes, 2500);

      onPredictionProgress({
        id: id,
        title: beginPayload.title,
        outcomes: outcomes,
        status: 'ACTIVE',
        ends_at: beginPayload.ends_at
      });

      testTimers.push(
        setTimeout(function () {
          onPredictionLock({
            id: id,
            title: beginPayload.title,
            outcomes: outcomes,
            status: 'LOCKED',
            locked_at: new Date().toISOString(),
            ends_at: beginPayload.ends_at
          });
        }, 500)
      );

      testTimers.push(
        setTimeout(function () {
          var winner = resolveTestOutcomes(outcomes);

          onPredictionEnd({
            id: id,
            title: beginPayload.title,
            outcomes: outcomes,
            status: 'RESOLVED',
            winning_outcome_id: winner.id
          });

          showToast('Test prediction resolved: ' + winner.title, 'success');
          testActive = false;
        }, 1400)
      );

      return;
    }

    if (mode === 'locked') {
      seedTestPoints(outcomes, 1200);

      onPredictionProgress({
        id: id,
        title: beginPayload.title,
        outcomes: outcomes,
        status: 'ACTIVE',
        ends_at: beginPayload.ends_at
      });

      testTimers.push(
        setTimeout(function () {
          seedTestPoints(outcomes, 1200);

          onPredictionProgress({
            id: id,
            title: beginPayload.title,
            outcomes: outcomes,
            status: 'ACTIVE',
            ends_at: beginPayload.ends_at
          });
        }, 1500)
      );

      testTimers.push(
        setTimeout(function () {
          onPredictionLock({
            id: id,
            title: beginPayload.title,
            outcomes: outcomes,
            status: 'LOCKED',
            locked_at: new Date().toISOString(),
            ends_at: beginPayload.ends_at
          });

          showToast('Test prediction locked');
        }, 4000)
      );

      hideTestOverlay(20000);
      return;
    }

    // Default: active full lifecycle
    showToast('Test prediction started', 'success');
    updateDebug({ prediction: 'test active' });

    var progressSteps = 8;

    for (var step = 1; step <= progressSteps; step++) {
      (function (stepNum) {
        testTimers.push(
          setTimeout(function () {
            seedTestPoints(outcomes, 700);

            onPredictionProgress({
              id: id,
              title: beginPayload.title,
              outcomes: outcomes,
              status: 'ACTIVE',
              ends_at: beginPayload.ends_at
            });
          }, stepNum * 1800)
        );
      })(step);
    }

    testTimers.push(
      setTimeout(function () {
        onPredictionLock({
          id: id,
          title: beginPayload.title,
          outcomes: outcomes,
          status: 'LOCKED',
          locked_at: new Date().toISOString(),
          ends_at: beginPayload.ends_at
        });

        showToast('Prediction locked');
        updateDebug({ prediction: 'test locked' });
      }, 16000)
    );

    testTimers.push(
      setTimeout(function () {
        var winner = resolveTestOutcomes(outcomes);

        onPredictionEnd({
          id: id,
          title: beginPayload.title,
          outcomes: outcomes,
          status: 'RESOLVED',
          winning_outcome_id: winner.id
        });

        showToast('Prediction resolved: ' + winner.title, 'success');
        updateDebug({ prediction: 'test resolved' });

        testActive = false;
      }, 20000)
    );
  }

  // ═══════════════════════════════════════════════════════════════
  // BUTTONS
  // ═══════════════════════════════════════════════════════════════

  if (testBtn) {
    testBtn.addEventListener('click', function (e) {
      e.preventDefault();
      runTestPrediction('active');
    });
  }

  if (floatTestBtn) {
    floatTestBtn.addEventListener('click', function (e) {
      e.preventDefault();
      runTestPrediction('active');
    });
  }

  if (layoutToggleBtn) {
    layoutToggleBtn.addEventListener('click', function (e) {
      e.preventDefault();
      toggleLayout();
    });
  }

  if (compactToggleBtn) {
    compactToggleBtn.addEventListener('click', function (e) {
      e.preventDefault();
      cycleDisplayMode();
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // KEYBOARD
  // ═══════════════════════════════════════════════════════════════

  document.addEventListener('keydown', function (e) {
    var tag = (e.target.tagName || '').toLowerCase();

    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
    if (e.target.isContentEditable) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;

    if (e.key === 'h' || e.key === 'H') {
      predictionOverlay.classList.toggle('hidden');
    }

    if (e.key === 'c' || e.key === 'C') {
      clearHideTimer();
      clearTestTimers();
      clearCompactResults();

      predictionOverlay.classList.remove('visible', 'slide-out');

      currentPrediction = null;
      lastPercents = {};
      testActive = false;

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      updateDebug({ prediction: 'none' });

      showToast('Cleared');
    }

    if (e.key === 'd' || e.key === 'D') {
      disconnect();
    }

    if (e.key === 't' || e.key === 'T') {
      e.preventDefault();
      runTestPrediction('active');
    }

    if (e.key === 'k' || e.key === 'K') {
      e.preventDefault();
      cycleDisplayMode();
    }

    if (e.key === 'l' || e.key === 'L') {
      e.preventDefault();
      toggleLayout();
    }
  });

  // ═══════════════════════════════════════════════════════════════
  // DRAG
  // ═══════════════════════════════════════════════════════════════

  var isDragging = false;
  var dragStartX = 0;
  var dragStartY = 0;
  var overlayStartX = 0;
  var overlayStartY = 0;

  var predHeader = document.querySelector('.pred-header');

  if (predHeader) {
    predHeader.addEventListener('mousedown', function (e) {
      if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
      if (displayMode !== 'full') return;
      if (ui.clickthrough) return;

      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;

      var rect = predictionOverlay.getBoundingClientRect();

      overlayStartX = rect.left;
      overlayStartY = rect.top;

      document.body.style.cursor = 'grabbing';
      document.body.style.userSelect = 'none';

      e.preventDefault();
    });
  }

  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;

    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;

    setOverlayPosition(overlayStartX + dx, overlayStartY + dy);
  });

  document.addEventListener('mouseup', function () {
    if (!isDragging) return;

    isDragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  window.addEventListener('resize', function () {
    restoreOverlayPosition();
  });

  // ═══════════════════════════════════════════════════════════════
  // PUBLIC API + POSTMESSAGE
  // ═══════════════════════════════════════════════════════════════

  window.StreamPredictions = {
    build: BUILD,
    test: runTestPrediction,
    disconnect: disconnect,
    debug: enableDebug,
    setMode: applyDisplayMode,
    setLayout: applyLayout,
    hide: function () {
      clearHideTimer();
      clearCompactResults();
      predictionOverlay.classList.remove('visible', 'slide-out');
      currentPrediction = null;
      lastPercents = {};
      updateDebug({ prediction: 'none' });
    }
  };

  window.addEventListener('message', function (event) {
    var data = event.data;

    if (!data || data.source !== 'stream-predictions-overlay') return;

    var type = data.type;

    if (type === 'test') {
      runTestPrediction(data.mode || 'active');
    } else if (type === 'hide' || type === 'clear') {
      window.StreamPredictions.hide();
    } else if (type === 'disconnect') {
      disconnect();
    } else if (type === 'mode') {
      if (data.mode === 'full' || data.mode === 'vertical' || data.mode === 'compact') {
        applyDisplayMode(data.mode);
      }
    } else if (type === 'layout') {
      if (data.layout === 'bottom' || data.layout === 'right') {
        applyLayout(data.layout);
      }
    } else if (type === 'debug') {
      enableDebug();
    }
  });

  // ═══════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════

  applyDisplayMode(displayMode);
  applyLayout(resultsLayout);
  restoreOverlayPosition();
  updateDebug();
  initAuth();

  if (P.has('test')) {
    var tv = P.get('test');

    if (tv !== '0' && tv !== 'false') {
      var testMode = (tv === '' || tv === '1' || tv === 'active') ? 'active' : tv;

      setTimeout(function () {
        runTestPrediction(testMode);
      }, 500);
    }
  }
})();
</script>
