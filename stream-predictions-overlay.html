<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<meta name="color-scheme" content="dark" />
<title>Stream Predictions</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>P</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════════════════
     STREAM PREDICTIONS OVERLAY — LIVE TWITCH INTEGRATION
     Automatically receives prediction events from Twitch via
     EventSub WebSocket. No backend needed.

     HOW TO USE:
     1. Add as a Browser Source in OBS (URL or local file)
     2. Click "Connect Twitch" — authorizes with Twitch
     3. Page goes blank after connecting (success!)
     4. Start a prediction on your Twitch channel
     5. The overlay appears automatically with live vote data

     KEYBOARD SHORTCUTS:
       H     Hide/Show overlay
       C     Clear current prediction display
       D     Disconnect (re-show connect button)
     ═══════════════════════════════════════════════════════════════ -->

<style>
  :root {
    --bg: #020203;
    --panel: #08080a;
    --panel-hover: rgba(255, 255, 255, 0.04);
    --t1: rgba(255, 255, 255, 0.92);
    --t2: rgba(255, 255, 255, 0.55);
    --t3: rgba(255, 255, 255, 0.32);
    --t4: rgba(255, 255, 255, 0.18);
    --line: rgba(255, 255, 255, 0.08);
    --line-soft: rgba(255, 255, 255, 0.05);
    --amber: #d4a853;
    --amber-soft: rgba(212, 168, 83, 0.5);
    --red: #c4473a;
    --ok: #88b576;
    --body: 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, monospace;
    --serif: 'Instrument Serif', Georgia, serif;
    /* Outcome colors — cycled through for multi-option predictions */
    --c0: #5b8def;
    --c1: #e85b9b;
    --c2: #88b576;
    --c3: #d4a853;
    --c4: #b894d9;
    --c5: #d49274;
    --c6: #5bcdef;
    --c7: #ef8b5b;
    --c8: #9b5bef;
    --c9: #5befb8;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    background: transparent;
    color: var(--t1);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* ═══ FLOATING TEST BUTTON — FIXED */
  .float-test-btn {
    position: fixed; bottom: 20px; right: 20px; z-index: 400; display: none;
    align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber);
    background: var(--panel); border: 1px solid rgba(212,168,83,0.3); border-radius: 100px; padding: 10px 16px; cursor: pointer;
  }
  .float-test-btn.visible { display: flex !important; }

  /* ═══ CONNECT SCREEN ═══ */
  .connect-screen {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: var(--bg);
  }
  .connect-screen.hidden { display: none; }

  .connect-title {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 400;
    color: var(--t1);
    letter-spacing: -0.02em;
  }
  .connect-title em {
    font-style: italic;
    color: var(--amber);
  }

  .connect-sub {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--t3);
    text-align: center;
    max-width: 400px;
    line-height: 1.6;
  }

  .connect-btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--t1);
    background: rgba(91, 71, 128, 0.15);
    border: 1px solid rgba(91, 71, 128, 0.4);
    border-radius: 100px;
    padding: 14px 32px;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .connect-btn:hover {
    background: rgba(91, 71, 128, 0.25);
    border-color: rgba(91, 71, 128, 0.6);
  }
  .connect-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .connect-status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--t3);
    margin-top: 8px;
  }
  .connect-status.error { color: var(--red); }
  .connect-status.success { color: var(--ok); }

  /* ═══ PREDICTION OVERLAY ═══ */
  .prediction-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 560px;
    z-index: 100;
    display: none;
    flex-direction: column;
    gap: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
    animation: overlayIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  .prediction-overlay.visible { display: flex; }
  .prediction-overlay.hidden { display: none; }

  @keyframes overlayIn {
    from { opacity: 0; margin-top: 20px; }
    to   { opacity: 1; margin-top: 0; }
  }

  /* ── Header (draggable) ── */
  .pred-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .pred-header:active {
    cursor: grabbing;
  }
  .pred-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--line-soft);
  }

  .pred-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pred-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
    animation: dotPulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .pred-dot.locked {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: none;
  }
  .pred-dot.ended {
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
    animation: none;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.3); }
  }

  .pred-timer {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }
  .pred-timer.urgent {
    color: var(--red);
    animation: urgentBlink 1s ease-in-out infinite;
  }
  .pred-timer.ended { color: var(--t3); }
  @keyframes urgentBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── Question ── */
  .pred-question {
    padding: 12px 16px 10px;
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    line-height: 1.25;
    color: var(--t1);
    letter-spacing: -0.005em;
  }

  /* ── Options ── */
  .pred-options {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pred-option {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.02);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    animation: optionIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes optionIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pred-option.winner {
    border-color: rgba(212, 168, 83, 0.5);
    box-shadow: 0 0 20px rgba(212, 168, 83, 0.15);
  }

  .pred-option-bar {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    transform-origin: left center;
    transition: transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
    pointer-events: none;
  }

  .pred-option-content {
    position: relative;
    z-index: 1;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pred-option-color {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pred-option-text {
    flex: 1;
    min-width: 0;
    font-family: var(--body);
    font-size: 13px;
    font-weight: 500;
    color: var(--t1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pred-option-pct {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--t2);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    transition: color 0.3s ease;
  }

  .pred-option.winner .pred-option-pct {
    color: var(--amber);
  }

  .pred-winner-badge {
    display: none;
    font-family: var(--mono);
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    background: rgba(212, 168, 83, 0.1);
    border: 1px solid rgba(212, 168, 83, 0.3);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .pred-option.winner .pred-winner-badge { display: inline-block; }

  /* ── Top contributor (shown during active prediction) ── */
  .pred-top-contributor {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--t3);
    padding-left: 24px;
    margin-top: -2px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: none;
  }
  .pred-top-contributor.visible { display: block; }
  .pred-top-contributor .tc-name { color: var(--t2); }

  /* ── Body (holds options + results) ── */
  .pred-body {
    display: flex;
    flex-direction: column;
  }
  /* Side-by-side layout: results appear to the right */
  .pred-body.layout-right {
    flex-direction: row;
    align-items: stretch;
  }
  .pred-body.layout-right .pred-options {
    flex: 1;
    min-width: 0;
  }
  .pred-body.layout-right .pred-results {
    width: 200px;
    flex-shrink: 0;
    border-left: 1px solid var(--line-soft);
    padding: 8px 12px;
    max-height: 300px;
    overflow-y: auto;
  }
  .pred-body.layout-right .pred-results::-webkit-scrollbar { width: 3px; }
  .pred-body.layout-right .pred-results::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

  /* ── Post-resolution results (points won/lost) ── */
  .pred-results {
    padding: 0 16px 14px;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .pred-results.visible { display: flex; }

  .pred-result-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--line-soft);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    animation: resultIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes resultIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .pred-result-name {
    flex: 1;
    min-width: 0;
    color: var(--t2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pred-result-amount {
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .pred-result-amount.won {
    color: var(--ok);
  }
  .pred-result-amount.lost {
    color: var(--red);
  }
  .pred-result-color {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Winner celebration particles ── */
  .celebration-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    will-change: transform, opacity;
  }

  /* ── Slide-out animation on dismiss ── */
  .prediction-overlay.slide-out {
    animation: overlayOut 0.5s cubic-bezier(0.4, 0, 1, 1) both;
  }
  @keyframes overlayOut {
    from { opacity: 1; margin-top: 0; }
    to   { opacity: 0; margin-top: 20px; }
  }

  /* ── Compact toggle button (in header) ── */
  .compact-toggle-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--t3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
    padding: 0;
  }
  .compact-toggle-btn:hover {
    color: var(--amber);
    border-color: var(--amber-soft);
  }
  .prediction-overlay.compact .compact-toggle-btn {
    color: var(--amber);
    border-color: var(--amber-soft);
  }
  .compact-toggle-btn.active {
    color: var(--amber);
    border-color: var(--amber-soft);
  }

  /* ═══ COMPACT MODE ═══ */
  .prediction-overlay.compact {
    width: 360px;
    bottom: 20px;
  }
  .prediction-overlay.compact .pred-header {
    padding: 6px 12px;
  }
  .prediction-overlay.compact .pred-label {
    font-size: 8px;
    gap: 6px;
  }
  .prediction-overlay.compact .pred-timer {
    font-size: 11px;
  }
  .prediction-overlay.compact .pred-question {
    display: none;
  }
  .prediction-overlay.compact .pred-options {
    padding: 0 12px 10px;
    gap: 4px;
  }
  .prediction-overlay.compact .pred-option-content {
    padding: 6px 10px;
    gap: 8px;
  }
  .prediction-overlay.compact .pred-option-text {
    font-size: 11px;
  }
  .prediction-overlay.compact .pred-option-pct {
    font-size: 11px;
  }
  .prediction-overlay.compact .pred-option-color {
    width: 8px;
    height: 8px;
  }
  .prediction-overlay.compact .pred-option-letter {
    width: 22px;
    height: 22px;
    font-size: 9px;
  }
  .prediction-overlay.compact .pred-top-contributor {
    display: none !important;
  }
  .prediction-overlay.compact .pred-results {
    display: none !important;
  }
  .prediction-overlay.compact .pred-footer {
    padding: 4px 12px;
  }
  .prediction-overlay.compact .pred-footer-meta {
    font-size: 7px;
  }
  .prediction-overlay.compact .pred-footer-status {
    font-size: 7px;
  }

  /* ── Footer ── */
  .pred-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    border-top: 1px solid var(--line-soft);
  }

  .pred-footer-meta {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--t3);
  }

  .pred-footer-status {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--t2);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pred-status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--t3);
  }
  .pred-status-dot.active {
    background: var(--ok);
    box-shadow: 0 0 6px var(--ok);
  }
  .pred-status-dot.locked {
    background: var(--red);
  }
  .pred-status-dot.ended {
    background: var(--amber);
  }

  /* ═══ TOAST ═══ */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
    background: var(--panel);
    border: 1px solid rgba(212, 168, 83, 0.3);
    border-radius: 100px;
    padding: 8px 16px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    z-index: 300;
  }
  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<!-- Connect screen -->
<div class="connect-screen" id="connectScreen">
  <div class="connect-title">Stream <em>Predictions</em></div>
  <div class="connect-sub">Connect your Twitch account to receive live prediction events automatically. The overlay will appear whenever a prediction starts on your channel.</div>
  <a class="connect-btn" id="connectBtn" href="#">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
    <span>Connect Twitch</span>
  </a>
  <button class="connect-btn" id="testBtn" style="background: rgba(212, 168, 83, 0.08); border-color: rgba(212, 168, 83, 0.3); color: var(--amber);">
    <span>Run Test Prediction</span>
  </button>
  <div class="connect-status" id="connectStatus"></div>
</div>

<!-- Floating test button (visible when connected, hidden when on connect screen) -->
<button class="float-test-btn" id="floatTestBtn" title="Run test prediction (T)" onclick="runTestPrediction();return false;">
  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
</button>

<!-- Prediction overlay -->
<div class="prediction-overlay" id="predictionOverlay">
  <div class="pred-header">
    <div class="pred-label">
      <span class="pred-dot" id="predDot"></span>
      <span>Prediction</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="compact-toggle-btn" id="layoutToggleBtn" title="Toggle results layout (L)" onclick="toggleLayout();return false;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </button>
      <button class="compact-toggle-btn" id="compactToggleBtn" title="Toggle compact mode (K)" onclick="applyCompactMode(!compactMode);return false;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <div class="pred-timer" id="predTimer">—</div>
    </div>
  </div>
  <div class="pred-question" id="predQuestion">—</div>
  <div class="pred-body" id="predBody">
    <div class="pred-options" id="predOptions"></div>
    <div class="pred-results" id="predResults"></div>
  </div>
  <div class="pred-footer">
    <div class="pred-footer-meta" id="predMeta">Prediction Active</div>
    <div class="pred-footer-status">
      <span class="pred-status-dot active" id="predStatusDot"></span>
      <span id="predStatusText">Active</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>


<script>
// CONFIG — FIXED: only read scope, PKCE ready
var CLIENT_ID = '3iov7b5p32ry0cvbbr79sygd91o7a5';
var REDIRECT_URI = window.location.origin + window.location.pathname;
var SCOPES = 'channel:read:predictions';
var TOKEN_KEY = 'pp-pred-token-v2';
var REFRESH_KEY = 'pp-pred-refresh-v2';
var EXPIRES_KEY = 'pp-pred-expires-v2';
var STATE_KEY = 'pp-pred-state';
var VERIFIER_KEY = 'pp-pred-verifier';
var COMPACT_KEY = 'stream-predictions-compact';
var LAYOUT_KEY = 'stream-predictions-layout';
var POS_KEY = 'stream-predictions-position';
var P = new URLSearchParams(window.location.search);

// Compact / layout (unchanged)
var compactMode=false;
if(P.get('compact')==='true') compactMode=true; else { try{ compactMode=localStorage.getItem(COMPACT_KEY)==='true'; }catch(e){} }

// STATE
var accessToken=null, refreshToken=null, broadcasterId=null, eventSubSocket=null, currentPrediction=null, timerInterval=null, refreshTimer=null;
var OUTCOME_COLORS=['var(--c0)','var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)','var(--c8)','var(--c9)'];
var connectScreen, connectBtn, connectStatus, predictionOverlay, predDot, predTimer, predQuestion, predOptions, predResults, predMeta, predStatusDot, predStatusText, toastEl;

// HELPERS
function showToast(t){ if(!toastEl) return; toastEl.textContent=t; toastEl.classList.add('visible'); setTimeout(function(){toastEl.classList.remove('visible');},2500); }
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function randStr(n){ var c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'; var r=''; for(var i=0;i<n;i++) r+=c.charAt(Math.floor(Math.random()*c.length)); return r; }
async function sha256(s){ var d=new TextEncoder().encode(s); return await crypto.subtle.digest('SHA-256',d); }
function b64url(buf){ var b=String.fromCharCode.apply(null,new Uint8Array(buf)); return btoa(b).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }

// AUTH — PKCE Authorization Code Flow (fixes implicit flow expiry + no refresh)
async function initAuth(){
  connectScreen=document.getElementById('connectScreen'); connectBtn=document.getElementById('connectBtn'); connectStatus=document.getElementById('connectStatus');
  predictionOverlay=document.getElementById('predictionOverlay'); predDot=document.getElementById('predDot'); predTimer=document.getElementById('predTimer');
  predQuestion=document.getElementById('predQuestion'); predOptions=document.getElementById('predOptions'); predResults=document.getElementById('predResults');
  predMeta=document.getElementById('predMeta'); predStatusDot=document.getElementById('predStatusDot'); predStatusText=document.getElementById('predStatusText'); toastEl=document.getElementById('toast');
  if(!CLIENT_ID){ connectStatus.textContent='No Client ID'; connectStatus.classList.add('error'); return; }

  // Handle redirect with ?code=
  var code=P.get('code'), state=P.get('state');
  if(code){
    var savedState=null, verifier=null; try{ savedState=sessionStorage.getItem(STATE_KEY); verifier=sessionStorage.getItem(VERIFIER_KEY); }catch(e){}
    if(!savedState || savedState!==state){ connectStatus.textContent='State mismatch — try again'; connectStatus.classList.add('error'); return; }
    try{
      connectStatus.textContent='Exchanging code…';
      var res=await fetch('https://id.twitch.tv/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:CLIENT_ID,code:code,code_verifier:verifier,grant_type:'authorization_code',redirect_uri:REDIRECT_URI})});
      if(!res.ok) throw new Error('Token exchange '+res.status);
      var tok=await res.json(); accessToken=tok.access_token; refreshToken=tok.refresh_token||null;
      try{ localStorage.setItem(TOKEN_KEY,accessToken); if(refreshToken) localStorage.setItem(REFRESH_KEY,refreshToken); if(tok.expires_in) localStorage.setItem(EXPIRES_KEY,String(Date.now()+tok.expires_in*1000)); sessionStorage.removeItem(STATE_KEY); sessionStorage.removeItem(VERIFIER_KEY);}catch(e){}
      window.history.replaceState(null,'',window.location.pathname);
      connectStatus.textContent='Connected!'; connectStatus.classList.add('success');
      if(tok.expires_in) scheduleRefresh(tok.expires_in);
      processToken(accessToken); return;
    }catch(e){ connectStatus.textContent='Auth failed: '+e.message; connectStatus.classList.add('error'); return; }
  }

  // Legacy hash token (old implicit flow) — support for existing users, then migrate
  var hash=window.location.hash.substring(1); var hp=new URLSearchParams(hash);
  if(hp.get('access_token')){
    var at=hp.get('access_token'); try{ localStorage.setItem(TOKEN_KEY,at); }catch(e){} window.history.replaceState(null,'',window.location.pathname);
    connectStatus.textContent='Migrating token…'; processToken(at); return;
  }

  try{ var stored=localStorage.getItem(TOKEN_KEY); var storedR=localStorage.getItem(REFRESH_KEY); var exp=localStorage.getItem(EXPIRES_KEY); if(stored){ accessToken=stored; refreshToken=storedR||null; connectStatus.textContent='Restoring…'; if(exp){ var ms=Math.max(0,parseInt(exp,10)-Date.now()); if(ms<60000 && refreshToken){ await refreshAccessToken(); } else if(ms>0){ scheduleRefresh(ms/1000); } } processToken(accessToken); return; } }catch(e){}

  // Build PKCE authorize URL
  var verifier2=randStr(64); var chalBuf=await sha256(verifier2); var chal=b64url(chalBuf); var st=randStr(16);
  try{ sessionStorage.setItem(VERIFIER_KEY,verifier2); sessionStorage.setItem(STATE_KEY,st); }catch(e){}
  var url='https://id.twitch.tv/oauth2/authorize?client_id='+encodeURIComponent(CLIENT_ID)+'&redirect_uri='+encodeURIComponent(REDIRECT_URI)+'&response_type=code&scope='+encodeURIComponent(SCOPES)+'&state='+encodeURIComponent(st)+'&code_challenge='+encodeURIComponent(chal)+'&code_challenge_method=S256';
  connectBtn.setAttribute('href',url); connectStatus.textContent='Click to connect your Twitch account';
}

async function processToken(token){
  accessToken=token;
  try{
    var r=await fetch('https://api.twitch.tv/helix/users',{headers:{'Client-ID':CLIENT_ID,'Authorization':'Bearer '+token}});
    if(r.status===401){ if(refreshToken){ try{ await refreshAccessToken(); return; }catch(e){} } throw new Error('Token expired'); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    var d=await r.json(); if(!d.data||!d.data.length) throw new Error('No user');
    broadcasterId=d.data[0].id; connectScreen.classList.add('hidden'); var fb=document.getElementById('floatTestBtn'); if(fb) fb.classList.add('visible'); showToast('Connected to Twitch'); subscribeToPredictions(); fetchActivePrediction();
  }catch(e){ connectScreen.classList.remove('hidden'); var fb2=document.getElementById('floatTestBtn'); if(fb2) fb2.classList.remove('visible'); connectStatus.textContent='Connection failed: '+e.message; connectStatus.classList.add('error'); try{ localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(REFRESH_KEY); localStorage.removeItem(EXPIRES_KEY);}catch(_){} accessToken=null; }
}

function scheduleRefresh(expiresInSec){ if(refreshTimer) clearTimeout(refreshTimer); var ms=expiresInSec? Math.max(60000,(expiresInSec-120)*1000) : 3.5*60*60*1000; refreshTimer=setTimeout(function(){ refreshAccessToken().catch(function(){ disconnect(); }); }, ms); }

async function refreshAccessToken(){
  if(!refreshToken) throw new Error('No refresh token — please reconnect');
  var res=await fetch('https://id.twitch.tv/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:refreshToken,client_id:CLIENT_ID})});
  if(!res.ok){ var t=await res.text(); throw new Error('Refresh failed '+res.status); }
  var data=await res.json(); accessToken=data.access_token; if(data.refresh_token) refreshToken=data.refresh_token;
  try{ localStorage.setItem(TOKEN_KEY,accessToken); if(refreshToken) localStorage.setItem(REFRESH_KEY,refreshToken); if(data.expires_in) localStorage.setItem(EXPIRES_KEY,String(Date.now()+data.expires_in*1000)); }catch(e){}
  console.log('Token refreshed'); scheduleRefresh(data.expires_in); if(eventSubSocket){ try{eventSubSocket.close();}catch(e){} } setTimeout(subscribeToPredictions,600); return accessToken;
}

function disconnect(){
  if(refreshTimer){ clearTimeout(refreshTimer); refreshTimer=null; }
  if(eventSubSocket){ try{eventSubSocket.close();}catch(e){} eventSubSocket=null; }
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  try{ localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(REFRESH_KEY); localStorage.removeItem(EXPIRES_KEY); sessionStorage.removeItem(STATE_KEY); sessionStorage.removeItem(VERIFIER_KEY);}catch(e){}
  accessToken=null; refreshToken=null; broadcasterId=null; currentPrediction=null;
  predictionOverlay.classList.remove('visible'); connectScreen.classList.remove('hidden');
  var fb=document.getElementById('floatTestBtn'); if(fb) fb.classList.remove('visible');
  connectStatus.textContent='Disconnected'; connectStatus.classList.remove('success','error');
}

// EVENTSUB — fixed reconnect
function handleWsOpen(){ console.log('WS open'); }
function handleWsError(e){ console.error('WS error',e); }
function handleWsClose(){ console.log('WS closed, retry 5s'); setTimeout(function(){ if(accessToken&&broadcasterId) subscribeToPredictions(); },5000); }
function handleWsMessage(ev){
  var m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
  if(m.metadata && m.metadata.message_type==='session_welcome'){ createSubscriptions(m.payload.session.id); return; }
  if(m.metadata && m.metadata.message_type==='session_keepalive') return;
  if(m.metadata && m.metadata.message_type==='notification'){
    var t=m.metadata.subscription_type, p=m.payload.event;
    if(t==='channel.prediction.begin') onPredictionBegin(p);
    else if(t==='channel.prediction.progress') onPredictionProgress(p);
    else if(t==='channel.prediction.lock') onPredictionLock(p);
    else if(t==='channel.prediction.end') onPredictionEnd(p);
    return;
  }
  if(m.metadata && m.metadata.message_type==='session_reconnect'){
    var u=m.payload.session.reconnect_url; try{eventSubSocket.close();}catch(e){}
    eventSubSocket=new WebSocket(u); eventSubSocket.onopen=handleWsOpen; eventSubSocket.onmessage=handleWsMessage; eventSubSocket.onerror=handleWsError; eventSubSocket.onclose=handleWsClose;
  }
}
async function subscribeToPredictions(){ try{ eventSubSocket=new WebSocket('wss://eventsub.wss.twitch.tv/ws'); eventSubSocket.onopen=handleWsOpen; eventSubSocket.onmessage=handleWsMessage; eventSubSocket.onerror=handleWsError; eventSubSocket.onclose=handleWsClose; }catch(e){ console.error(e); } }
async function createSubscriptions(sid){ var types=['channel.prediction.begin','channel.prediction.progress','channel.prediction.lock','channel.prediction.end']; for(var i=0;i<types.length;i++){ try{ var r=await fetch('https://api.twitch.tv/helix/eventsub/subscriptions',{method:'POST',headers:{'Client-ID':CLIENT_ID,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({type:types[i],version:'1',condition:{broadcaster_user_id:broadcasterId},transport:{method:'websocket',session_id:sid}})}); if(r.status===401){ try{ await refreshAccessToken(); return; }catch(e){ disconnect(); return; } } if(r.ok) console.log('Subbed '+types[i]); else console.warn('Sub fail '+types[i],await r.text()); }catch(e){ console.warn(e); } } }
async function fetchActivePrediction(){ try{ var r=await fetch('https://api.twitch.tv/helix/predictions?broadcaster_id='+broadcasterId,{headers:{'Client-ID':CLIENT_ID,'Authorization':'Bearer '+accessToken}}); if(r.status===401){ try{ await refreshAccessToken(); return; }catch(e){ disconnect(); return; } } if(!r.ok) return; var d=await r.json(); if(d.data&&d.data.length){ for(var i=0;i<d.data.length;i++){ var p=d.data[i]; if(p.status==='ACTIVE'||p.status==='LOCKED'){ onPredictionBegin(p); if(p.status==='LOCKED') onPredictionLock(p); break; } } } }catch(e){ console.warn(e); } }

// PREDICTION HANDLERS
function onPredictionBegin(pl){ currentPrediction={id:pl.id,title:pl.title,outcomes:pl.outcomes||[],status:'ACTIVE',endsAt:pl.ends_at}; renderPrediction(); startTimer(); }
function onPredictionProgress(pl){ if(!currentPrediction||currentPrediction.id!==pl.id){ onPredictionBegin(pl); return; } currentPrediction.outcomes=pl.outcomes||currentPrediction.outcomes; renderPrediction(); }
function onPredictionLock(pl){ if(!currentPrediction||currentPrediction.id!==pl.id) return; currentPrediction.status='LOCKED'; currentPrediction.lockedAt=pl.locked_at; renderPrediction(); }
function onPredictionEnd(pl){ if(!currentPrediction||currentPrediction.id!==pl.id) return; currentPrediction.status=pl.status; currentPrediction.winningOutcomeId=pl.winning_outcome_id; if(pl.outcomes) currentPrediction.outcomes=pl.outcomes; if(pl.status==='RESOLVED'&&pl.winning_outcome_id){ for(var i=0;i<currentPrediction.outcomes.length;i++){ currentPrediction.outcomes[i].isWinner=(currentPrediction.outcomes[i].id===pl.winning_outcome_id); } } if(timerInterval){clearInterval(timerInterval);timerInterval=null;} renderPrediction(); if(pl.status==='RESOLVED') spawnCelebration(); setTimeout(function(){ if(currentPrediction&&currentPrediction.id===pl.id){ predictionOverlay.classList.add('slide-out'); setTimeout(function(){ predictionOverlay.classList.remove('visible','slide-out'); currentPrediction=null; },500); } },15000); }


function spawnCelebration() {
  var winnerEl = predictionOverlay.querySelector('.pred-option.winner');
  if (!winnerEl) return;

  var rect = winnerEl.getBoundingClientRect();
  var centerX = rect.left + rect.width / 2;
  var centerY = rect.top + rect.height / 2;

  var colors = ['#d4a853', '#e8c87a', '#88b576', '#5b8def', '#e85b9b'];
  var particleCount = 30;

  for (var i = 0; i < particleCount; i++) {
    var p = document.createElement('div');
    p.className = 'celebration-particle';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = centerX + 'px';
    p.style.top = centerY + 'px';
    p.style.boxShadow = '0 0 6px ' + p.style.background;
    document.body.appendChild(p);

    var angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.5;
    var velocity = 80 + Math.random() * 120;
    var vx = Math.cos(angle) * velocity;
    var vy = Math.sin(angle) * velocity - 40; // slight upward bias
    var rotation = Math.random() * 720;
    var duration = 800 + Math.random() * 600;

    var startTime = Date.now();
    (function(particle, vx, vy, rotation, duration, startTime) {
      function animate() {
        var elapsed = Date.now() - startTime;
        var progress = elapsed / duration;
        if (progress >= 1) {
          particle.remove();
          return;
        }
        var x = vx * progress;
        var y = vy * progress + 0.5 * 200 * progress * progress; // gravity
        var r = rotation * progress;
        var opacity = 1 - progress;
        particle.style.transform = 'translate(' + x + 'px, ' + y + 'px) rotate(' + r + 'deg)';
        particle.style.opacity = opacity;
        requestAnimationFrame(animate);
      }
      animate();
    })(p, vx, vy, rotation, duration, startTime);
  }
}

// RENDER
// ═══════════════════════════════════════════════════════════════
function renderPrediction() {
  if (!currentPrediction) {
    predictionOverlay.classList.remove('visible');
    return;
  }

  predictionOverlay.classList.add('visible');
  predQuestion.textContent = currentPrediction.title || '—';

  // Status
  var isLocked = currentPrediction.status === 'LOCKED';
  var isEnded = currentPrediction.status === 'RESOLVED' || currentPrediction.status === 'CANCELED';

  predDot.className = 'pred-dot';
  predStatusDot.className = 'pred-status-dot';
  if (isEnded) {
    predDot.classList.add('ended');
    predStatusDot.classList.add('ended');
    predStatusText.textContent = 'Ended';
    predMeta.textContent = currentPrediction.status === 'RESOLVED' ? 'Prediction Resolved' : 'Prediction Canceled';
    predTimer.classList.add('ended');
  } else if (isLocked) {
    predDot.classList.add('locked');
    predStatusDot.classList.add('locked');
    predStatusText.textContent = 'Locked';
    predMeta.textContent = 'Prediction Locked';
    predTimer.classList.remove('ended');
  } else {
    predStatusDot.classList.add('active');
    predStatusText.textContent = 'Active';
    predMeta.textContent = 'Prediction Active';
    predTimer.classList.remove('ended');
  }

  // Calculate total points
  var totalPoints = 0;
  for (var i = 0; i < currentPrediction.outcomes.length; i++) {
    var pts = parseInt(currentPrediction.outcomes[i].channel_points) || 0;
    totalPoints += pts;
  }

  // Render options — update in place if elements exist, otherwise build from scratch
  var existingOptions = predOptions.querySelectorAll('.pred-option');
  var needsRebuild = existingOptions.length !== currentPrediction.outcomes.length;

  if (needsRebuild) {
    // Full rebuild (first render or outcome count changed)
    var html = '';
    for (var i = 0; i < currentPrediction.outcomes.length; i++) {
      var outcome = currentPrediction.outcomes[i];
      var color = OUTCOME_COLORS[i % OUTCOME_COLORS.length];
      html += '<div class="pred-option" data-idx="' + i + '" style="animation-delay:' + (i * 0.08) + 's;">' +
        '<div class="pred-option-bar" style="background: ' + color + '; opacity: 0.12; transform: scaleX(0);"></div>' +
        '<div class="pred-option-content">' +
          '<div class="pred-option-color" style="background: ' + color + ';"></div>' +
          '<div class="pred-option-text"></div>' +
          '<span class="pred-winner-badge">Winner</span>' +
          '<div class="pred-option-pct">0%</div>' +
        '</div>' +
        '<div class="pred-top-contributor"></div>' +
      '</div>';
    }
    predOptions.innerHTML = html;
    existingOptions = predOptions.querySelectorAll('.pred-option');
  }

  // Update each option in place (no DOM destruction = smooth transitions)
  for (var i = 0; i < currentPrediction.outcomes.length; i++) {
    var outcome = currentPrediction.outcomes[i];
    var pts = parseInt(outcome.channel_points) || 0;
    var pct = totalPoints > 0 ? Math.round(pts / totalPoints * 100) : 0;
    var color = OUTCOME_COLORS[i % OUTCOME_COLORS.length];
    var isWinner = outcome.isWinner === true;

    // Check for top contributor (during active prediction)
    var topContributor = null;
    if (!isEnded && outcome.top_predictors && outcome.top_predictors.length > 0) {
      var top = outcome.top_predictors[0];
      for (var j = 0; j < outcome.top_predictors.length; j++) {
        if ((outcome.top_predictors[j].channel_points_used || 0) > (top.channel_points_used || 0)) {
          top = outcome.top_predictors[j];
        }
      }
      topContributor = top;
    }

    // Use top contributor's color if available
    var barColor = color;
    if (topContributor && topContributor.color && topContributor.color !== '') {
      barColor = topContributor.color;
    }

    var optionEl = existingOptions[i];
    if (!optionEl) continue;

    // Update bar (smooth CSS transition handles the animation)
    var barEl = optionEl.querySelector('.pred-option-bar');
    barEl.style.background = barColor;
    barEl.style.transform = 'scaleX(' + (pct / 100) + ')';

    // Update color dot
    optionEl.querySelector('.pred-option-color').style.background = barColor;

    // Update text
    optionEl.querySelector('.pred-option-text').textContent = outcome.title;

    // Update percentage
    optionEl.querySelector('.pred-option-pct').textContent = pct + '%';

    // Update winner state
    optionEl.classList.toggle('winner', isWinner);

    // Update top contributor
    var tcEl = optionEl.querySelector('.pred-top-contributor');
    if (topContributor && topContributor.user_name && !isEnded) {
      var contribPoints = parseInt(topContributor.channel_points_used) || 0;
      tcEl.innerHTML = '<span class="tc-name">' + escapeHtml(topContributor.user_name) + '</span> bet ' + contribPoints.toLocaleString() + ' pts';
      tcEl.classList.add('visible');
    } else {
      tcEl.classList.remove('visible');
    }
  }

  // Render results (points won/lost) after resolution
  if (isEnded && currentPrediction.status === 'RESOLVED') {
    var resultsHtml = '';
    var allPredictors = [];

    // Collect all top_predictors from all outcomes
    for (var i = 0; i < currentPrediction.outcomes.length; i++) {
      var outcome = currentPrediction.outcomes[i];
      var outcomeColor = OUTCOME_COLORS[i % OUTCOME_COLORS.length];
      if (outcome.top_predictors) {
        for (var j = 0; j < outcome.top_predictors.length; j++) {
          var pred = outcome.top_predictors[j];
          allPredictors.push({
            name: pred.user_name || 'Unknown',
            won: parseInt(pred.channel_points_won) || 0,
            used: parseInt(pred.channel_points_used) || 0,
            color: (pred.color && pred.color !== '') ? pred.color : outcomeColor,
            isWinner: outcome.isWinner === true
          });
        }
      }
    }

    // Sort by points won (descending), show top 8
    allPredictors.sort(function(a, b) { return b.won - a.won; });
    var showCount = Math.min(8, allPredictors.length);

    for (var i = 0; i < showCount; i++) {
      var p = allPredictors[i];
      var amountText, amountClass;

      if (p.isWinner) {
        amountText = '+' + p.won.toLocaleString() + ' pts';
        amountClass = 'won';
      } else {
        amountText = '\u2212' + p.used.toLocaleString() + ' pts';
        amountClass = 'lost';
      }

      resultsHtml += '<div class="pred-result-row" style="animation-delay:' + (i * 0.06) + 's;">' +
        '<div class="pred-result-color" style="background: ' + p.color + ';"></div>' +
        '<div class="pred-result-name">' + escapeHtml(p.name) + '</div>' +
        '<div class="pred-result-amount ' + amountClass + '">' + amountText + '</div>' +
      '</div>';
    }

    if (resultsHtml) {
      predResults.innerHTML = resultsHtml;
      predResults.classList.add('visible');
    } else {
      predResults.classList.remove('visible');
    }
  } else {
    predResults.classList.remove('visible');
    predResults.innerHTML = '';
  }
}

// TIMER
// ═══════════════════════════════════════════════════════════════
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(updateTimerDisplay, 1000);
}

function updateTimerDisplay() {
  if (!currentPrediction || !currentPrediction.endsAt) {
    predTimer.textContent = '—';
    return;
  }

  var isLocked = currentPrediction.status === 'LOCKED';
  var isEnded = currentPrediction.status === 'RESOLVED' || currentPrediction.status === 'CANCELED';

  if (isLocked || isEnded) {
    predTimer.textContent = isEnded ? 'Done' : 'Locked';
    predTimer.classList.remove('urgent');
    return;
  }

  var now = new Date().getTime();
  var ends = new Date(currentPrediction.endsAt).getTime();
  var remaining = Math.max(0, Math.floor((ends - now) / 1000));

  var min = Math.floor(remaining / 60);
  var sec = remaining % 60;
  predTimer.textContent = (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;

  // Urgent in last 30s
  predTimer.classList.toggle('urgent', remaining <= 30 && remaining > 0);
}

// TEST PREDICTION — simulates a full prediction lifecycle
// ═══════════════════════════════════════════════════════════════
var testTimers = [];
var testActive = false;

function clearTestTimers() {
  for (var i = 0; i < testTimers.length; i++) clearTimeout(testTimers[i]);
  testTimers = [];
}

function runTestPrediction() {
  if (testActive) return;
  testActive = true;
  clearTestTimers();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  // Hide connect screen if visible
  connectScreen.classList.add('hidden');

  // Fake prediction with 4 outcomes
  var outcomes = [
    { id: 'test-a', title: 'Pobot', channel_points: 0, top_predictors: [], color: '#5b8def' },
    { id: 'test-b', title: 'Prestler', channel_points: 0, top_predictors: [], color: '#e85b9b' },
    { id: 'test-c', title: 'Cultural Pic', channel_points: 0, top_predictors: [], color: '#88b576' },
    { id: 'test-d', title: 'Pisc', channel_points: 0, top_predictors: [], color: '#d4a853' }
  ];

  var fakeNames = ['FizzyCait', 'BreadSanta', 'HarryHardy', 'grgrsmth', 'Albrot', 'JosieRustle', 'AngelInterceptor', 'AliDooLalli'];
  var fakeColors = ['#5b8def', '#e85b9b', '#88b576', '#d4a853', '#b894d9', '#d49274', '#5bcdef', '#ef8b5b'];

  // Assign random top predictors to each outcome
  for (var i = 0; i < outcomes.length; i++) {
    var numPredictors = 2 + Math.floor(Math.random() * 3);
    for (var j = 0; j < numPredictors; j++) {
      var pts = 500 + Math.floor(Math.random() * 5000);
      outcomes[i].top_predictors.push({
        user_id: 'test-' + i + '-' + j,
        user_name: fakeNames[Math.floor(Math.random() * fakeNames.length)],
        channel_points_used: pts,
        channel_points_won: 0,
        color: fakeColors[Math.floor(Math.random() * fakeColors.length)]
      });
    }
  }

  // 1. BEGIN — prediction starts
  var beginPayload = {
    id: 'test-prediction-001',
    title: 'What will Pete draw first tonight?',
    outcomes: outcomes,
    status: 'ACTIVE',
    ends_at: new Date(Date.now() + 30000).toISOString() // 30s timer
  };
  onPredictionBegin(beginPayload);
  showToast('Test prediction started');

  // 2. PROGRESS — votes trickle in over 15 seconds
  var progressSteps = 8;
  for (var step = 1; step <= progressSteps; step++) {
    (function(stepNum) {
      testTimers.push(setTimeout(function() {
        // Add random points to each outcome
        for (var i = 0; i < outcomes.length; i++) {
          var addPts = 200 + Math.floor(Math.random() * 3000);
          outcomes[i].channel_points += addPts;
          // Update top predictor points
          if (outcomes[i].top_predictors.length > 0) {
            outcomes[i].top_predictors[0].channel_points_used += Math.floor(addPts * 0.4);
          }
        }
        var progressPayload = {
          id: 'test-prediction-001',
          title: beginPayload.title,
          outcomes: outcomes,
          status: 'ACTIVE',
          ends_at: beginPayload.ends_at
        };
        onPredictionProgress(progressPayload);
      }, stepNum * 1800));
    })(step);
  }

  // 3. LOCK — at 16 seconds
  testTimers.push(setTimeout(function() {
    var lockPayload = {
      id: 'test-prediction-001',
      title: beginPayload.title,
      outcomes: outcomes,
      status: 'LOCKED',
      locked_at: new Date().toISOString(),
      ends_at: beginPayload.ends_at
    };
    onPredictionLock(lockPayload);
    showToast('Prediction locked');
  }, 16000));

  // 4. END — resolve at 20 seconds
  testTimers.push(setTimeout(function() {
    // Pick a winner (weighted toward the one with most points)
    var winnerIdx = 0;
    var maxPts = -1;
    for (var i = 0; i < outcomes.length; i++) {
      if (outcomes[i].channel_points > maxPts) {
        maxPts = outcomes[i].channel_points;
        winnerIdx = i;
      }
    }

    // Calculate won amounts for winners
    var totalLosingPoints = 0;
    for (var i = 0; i < outcomes.length; i++) {
      if (i !== winnerIdx) totalLosingPoints += outcomes[i].channel_points;
    }

    for (var i = 0; i < outcomes.length; i++) {
      outcomes[i].isWinner = (i === winnerIdx);
      if (i === winnerIdx) {
        // Winners get their bet back + share of losing pool
        for (var j = 0; j < outcomes[i].top_predictors.length; j++) {
          var used = outcomes[i].top_predictors[j].channel_points_used;
          var share = totalLosingPoints > 0 ? Math.round(used / outcomes[i].channel_points * totalLosingPoints) : 0;
          outcomes[i].top_predictors[j].channel_points_won = used + share;
        }
      } else {
        // Losers get 0
        for (var j = 0; j < outcomes[i].top_predictors.length; j++) {
          outcomes[i].top_predictors[j].channel_points_won = 0;
        }
      }
    }

    var endPayload = {
      id: 'test-prediction-001',
      title: beginPayload.title,
      outcomes: outcomes,
      status: 'RESOLVED',
      winning_outcome_id: outcomes[winnerIdx].id,
      ended_at: new Date().toISOString()
    };
    onPredictionEnd(endPayload);
    showToast('Prediction resolved: ' + outcomes[winnerIdx].title);
    testActive = false;
  }, 20000));
}

// Wire up test button
document.getElementById('testBtn').addEventListener('click', function(e) {
  e.preventDefault();
  runTestPrediction();
});

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.key === 'h' || e.key === 'H') {
    predictionOverlay.classList.toggle('hidden');
  }
  if (e.key === 'c' || e.key === 'C') {
    predictionOverlay.classList.remove('visible');
    currentPrediction = null;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    clearTestTimers();
    testActive = false;
    showToast('Cleared');
  }
  if (e.key === 'd' || e.key === 'D') {
    disconnect();
  }
  if (e.key === 't' || e.key === 'T') {
    e.preventDefault();
    runTestPrediction();
  }
  if (e.key === 'k' || e.key === 'K') {
    e.preventDefault();
    applyCompactMode(!compactMode);
    showToast(compactMode ? 'Compact mode' : 'Full mode');
  }
  if (e.key === 'l' || e.key === 'L') {
    e.preventDefault();
    toggleLayout();
  }
});

// ═══════════════════════════════════════════════════════════════
// DRAG — move the overlay by dragging the header
// ═══════════════════════════════════════════════════════════════
var POS_KEY = 'stream-predictions-position';
var isDragging = false;
var dragStartX = 0, dragStartY = 0;
var overlayStartX = 0, overlayStartY = 0;

function setOverlayPosition(x, y) {
  // Clamp to viewport
  x = Math.max(0, Math.min(window.innerWidth - 100, x));
  y = Math.max(0, Math.min(window.innerHeight - 50, y));
  predictionOverlay.style.left = x + 'px';
  predictionOverlay.style.top = y + 'px';
  try { localStorage.setItem(POS_KEY, JSON.stringify({ x: x, y: y })); } catch(e) {}
}

function restoreOverlayPosition() {
  try {
    var saved = JSON.parse(localStorage.getItem(POS_KEY) || 'null');
    if (saved) {
      setOverlayPosition(saved.x, saved.y);
      return;
    }
  } catch(e) {}
  // Default: centered horizontally, 80px from bottom
  var defaultX = (window.innerWidth - 560) / 2;
  var defaultY = window.innerHeight - 400;
  setOverlayPosition(defaultX, defaultY);
}

// Make header draggable
var predHeader = document.querySelector('.pred-header');
if (predHeader) {
  predHeader.addEventListener('mousedown', function(e) {
    // Don't drag if clicking on a button inside the header
    if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;

    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    var rect = predictionOverlay.getBoundingClientRect();
    overlayStartX = rect.left;
    overlayStartY = rect.top;
    document.body.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    setOverlayPosition(overlayStartX + dx, overlayStartY + dy);
  });

  document.addEventListener('mouseup', function() {
    if (!isDragging) return;
    isDragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

// Reposition on window resize (keep on screen)
window.addEventListener('resize', function() {
  var rect = predictionOverlay.getBoundingClientRect();
  setOverlayPosition(rect.left, rect.top);
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
applyCompactMode(compactMode);
applyLayout(resultsLayout);
restoreOverlayPosition();
initAuth();

</script>
