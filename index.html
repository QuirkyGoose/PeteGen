<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Peet Pics — The Vault</title>
<meta name="description" content="A permanent archive dedicated to the finest Peet-adjacent artwork, Pobots, Prestlers, and Cultural Artefacts of Our Time." />

<meta property="og:title" content="Peet Pics — The Vault" />
<meta property="og:description" content="A permanent archive dedicated to the finest Peet-adjacent artwork, Pobots, Prestlers, and Cultural Artefacts of Our Time." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://petepicsgallery.pages.dev/" />
<meta property="og:image" content="https://petepicsgallery.pages.dev/og-image.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Peet Pics — The Vault" />
<meta name="twitter:description" content="A permanent archive dedicated to the finest Peet-adjacent artwork, Pobots, Prestlers, and Cultural Artefacts of Our Time." />
<link rel="canonical" href="https://petepicsgallery.pages.dev/" />
<meta name="theme-color" content="#020203" />

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>P</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* ======================================================================
     Peet Pics — The Vault · Full site
     Aesthetic: Gemma 4 WebGPU Space (pure black, bottom-anchored hero,
     Instrument Serif + Geist + Geist Mono, pill buttons, hairline borders)
     Background: metaballs + halftone (vault amber/rust/rose palette)
     Routes: #/ (landing) · #/gallery/:room · #/artwork/:id
     ====================================================================== */

  :root {
    --bg: #020203;
    --t1: rgba(255, 255, 255, 0.92);
    --t2: rgba(255, 255, 255, 0.55);
    --t3: rgba(255, 255, 255, 0.32);
    --t4: rgba(255, 255, 255, 0.20);
    --line: rgba(255, 255, 255, 0.08);
    --line-soft: rgba(255, 255, 255, 0.06);
    --panel: rgba(255, 255, 255, 0.03);
    --panel-hover: rgba(255, 255, 255, 0.06);
    --ok: #64ffa0;
    --warn: #ffcd6b;
    --danger: #ff7a6b;
    --amber: #d4a853;
    --amber-soft: rgba(212, 168, 83, 0.5);
    --rust: #d49274;
    --rose: #d9a3b8;
    --sage: #9bbf9b;
    --violet: #b894d9;

    --display: "Instrument Serif", Georgia, "Times New Roman", serif;
    --body: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --maxw: 820px;
    --maxw-wide: 1200px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--t1);
    font-family: var(--body);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  button, textarea, input { font: inherit; color: inherit; }
  button { appearance: none; background: none; border: 0; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: rgba(212, 168, 83, 0.3); }
  body::-webkit-scrollbar { width: 8px; }
  body::-webkit-scrollbar-track { background: transparent; }
  body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  body::-webkit-scrollbar-thumb:hover { background: var(--t4); }

  /* ======================================================================
     METABALLS BACKGROUND
     ====================================================================== */
  #metaballs-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: var(--bg);
  }
  #halftone, #metaballs-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #metaballs-svg {
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .bg-fade {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 70%;
    background: linear-gradient(to top, var(--bg) 0%, var(--bg) 14%, rgba(2, 2, 3, 0.55) 52%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* ======================================================================
     APP SHELL
     ====================================================================== */
  #app {
    position: relative;
    z-index: 2;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .screen {
    flex: 1;
    position: relative;
    animation: fadeIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  /* ======================================================================
     TOP BAR (shared across all routes)
     ====================================================================== */
  .top-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(2, 2, 3, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line-soft);
  }
  .top-bar-inner {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .top-bar-left, .top-bar-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  /* Divider between brand and back button */
  .top-bar-left .back-btn {
    padding-left: 14px;
    border-left: 1px solid var(--line);
    border-radius: 0;
    border-top: 0;
    border-right: 0;
    border-bottom: 0;
  }
  .top-bar-left .back-btn:hover {
    border-left-color: rgba(255, 255, 255, 0.2);
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .brand-mark {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    background: transparent;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.12),
      0 0 0 4px rgba(212, 168, 83, 0.06),
      0 2px 8px rgba(0, 0, 0, 0.35);
    transition: transform 0.25s ease, box-shadow 0.3s ease;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .brand:hover .brand-mark {
    transform: scale(1.06);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.2),
      0 0 0 5px rgba(212, 168, 83, 0.14),
      0 4px 14px rgba(0, 0, 0, 0.45);
  }
  .brand-name {
    font-family: var(--display);
    font-size: 21.6px;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: var(--t1);
    line-height: 1.2;
    white-space: nowrap;
  }
  .brand-name em {
    font-style: italic;
    color: var(--amber);
  }
  .brand-sub {
    font-family: var(--body);
    font-size: 9.3px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--t3);
    display: block;
    margin-top: -1px;
    margin-left: 4px;
    border-left: 1px solid var(--line);
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--t2);
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 100px;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .back-btn:hover { border-color: rgba(255, 255, 255, 0.35); color: var(--t1); }
  .back-btn svg { width: 11px; height: 11px; }
  .twitch-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--t2);
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 100px;
    transition: border-color 0.25s ease, color 0.25s ease;
  }
  .twitch-link:hover { border-color: rgba(255, 255, 255, 0.4); color: var(--t1); }
  .twitch-link svg { width: 11px; height: 11px; }

  /* ── Random Pic Button ── */
  .random-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    padding: 0;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 50%;
    color: var(--t2);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .random-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
    transform: rotate(180deg);
    background: rgba(212, 168, 83, 0.06);
  }
  .random-btn:active {
    transform: rotate(360deg) scale(0.92);
  }
  .random-btn svg {
    width: 14px;
    height: 14px;
  }
  @media (max-width: 768px) {
    .random-btn { width: 30px; height: 30px; }
    .random-btn svg { width: 12px; height: 12px; }
  }

  /* ── Twitch Live Indicator ── */
  .twitch-live-indicator {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--t3);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--panel);
    transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .twitch-live-indicator .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--t3);
    flex-shrink: 0;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  /* Checking state */
  .twitch-live-indicator.is-checking .live-dot {
    background: var(--amber);
    animation: liveDotPulse 1s ease-in-out infinite;
  }
  .twitch-live-indicator.is-checking {
    color: var(--t2);
    border-color: rgba(212, 168, 83, 0.2);
  }
  /* Live state */
  .twitch-live-indicator.is-live {
    color: #fff;
    border-color: rgba(255, 80, 80, 0.4);
    background: rgba(255, 80, 80, 0.08);
  }
  .twitch-live-indicator.is-live .live-dot {
    background: #ff5050;
    box-shadow: 0 0 8px rgba(255, 80, 80, 0.6);
    animation: liveDotPulse 1.5s ease-in-out infinite;
  }
  .twitch-live-indicator.is-live:hover {
    border-color: rgba(255, 80, 80, 0.6);
    background: rgba(255, 80, 80, 0.12);
  }
  /* Offline state */
  .twitch-live-indicator.is-offline {
    color: var(--t3);
  }
  .twitch-live-indicator.is-offline .live-dot {
    background: var(--t4);
  }
  .twitch-live-indicator.is-offline:hover {
    color: var(--t2);
    border-color: rgba(255, 255, 255, 0.2);
  }
  /* Error state (can't reach Twitch API) */
  .twitch-live-indicator.is-error {
    color: var(--t4);
    opacity: 0.6;
  }
  .twitch-live-indicator.is-error .live-dot {
    background: var(--t4);
  }
  @keyframes liveDotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  /* Hide the indicator text on mobile, keep just the dot */
  @media (max-width: 760px) {
    .twitch-live-indicator .live-text { display: none; }
    .twitch-live-indicator { padding: 8px 10px; }
    .next-stream-pill .next-stream-label { display: none; }
    .next-stream-pill { padding: 8px 10px; }
  }

  /* ── Next Stream Pill ── */
  .next-stream-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--t2);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--panel);
    transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .next-stream-pill:hover {
    color: var(--t1);
    border-color: rgba(255, 255, 255, 0.25);
    background: var(--panel-hover);
  }
  .next-stream-pill svg { color: var(--amber); flex-shrink: 0; }
  .next-stream-pill .next-stream-label {
    max-width: 30ch;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Search bar ── */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
    flex: 1;
    max-width: 300px;
  }
  .search-wrap > svg {
    position: absolute;
    left: 12px;
    width: 14px;
    height: 14px;
    color: var(--amber);
    opacity: 0.5;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 7px 12px 7px 34px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 100px;
    color: var(--t1);
    font-family: var(--body);
    font-size: 12.5px;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .search-input:focus {
    outline: none;
    border-color: rgba(212, 168, 83, 0.4);
    background: var(--panel-hover);
  }
  .search-input::placeholder { color: var(--t4); }
  .search-input::-webkit-search-cancel-button { -webkit-appearance: none; }

  @media (max-width: 760px) {
    .search-wrap { max-width: 150px; }
    .search-input { font-size: 11px; padding: 6px 10px 6px 30px; }
  }
  /* On very small screens, collapse the search into an icon that expands on tap */
  @media (max-width: 600px) {
    .search-wrap {
      max-width: none;
      flex: 0 1 auto;
      transition: max-width 0.3s ease, flex 0.3s ease;
    }
    .search-wrap:not(.expanded) {
      max-width: 36px;
    }
    .search-wrap:not(.expanded) .search-input {
      opacity: 0;
      padding-left: 36px;
      pointer-events: none;
    }
    .search-wrap.expanded {
      flex: 1;
      max-width: 100%;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      padding: 8px 16px;
      background: rgba(5, 5, 7, 0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      z-index: 60;
    }
    .search-wrap.expanded .search-input {
      opacity: 1;
      pointer-events: auto;
      font-size: 14px;
      padding: 10px 14px 10px 36px;
    }
    .search-wrap.expanded > svg {
      width: 16px;
      height: 16px;
      left: 28px;
    }
  }

  /* ======================================================================
     TOP BAR — Gallery Switcher Dropdown
     (mirrors the live site's nav tabs, but collapses them into a single
      pill-style dropdown so it fits the minimal top-bar aesthetic)
     ====================================================================== */
  .nav-dropdown {
    position: relative;
    display: inline-flex;
  }
  .nav-dropdown-trigger {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--t2);
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: var(--panel);
    transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    cursor: pointer;
  }
  .nav-dropdown-trigger:hover {
    border-color: rgba(255, 255, 255, 0.35);
    color: var(--t1);
    background: var(--panel-hover);
  }
  .nav-dropdown-trigger .nav-dropdown-label {
    color: var(--t3);
    transition: color 0.2s ease;
  }
  .nav-dropdown-trigger:hover .nav-dropdown-label { color: var(--t2); }
  .nav-dropdown-trigger .nav-dropdown-current {
    color: var(--t1);
    font-weight: 500;
    max-width: 14ch;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-dropdown-trigger .nav-dropdown-current.is-amber { color: var(--amber); }
  .nav-dropdown-trigger .nav-dropdown-current.is-rust  { color: var(--rust); }
  .nav-dropdown-trigger .nav-dropdown-current.is-rose  { color: var(--rose); }
  .nav-dropdown-trigger .nav-dropdown-current.is-sage  { color: var(--sage); }
  .nav-dropdown-trigger .nav-dropdown-current.is-violet{ color: var(--violet); }
  .nav-dropdown-trigger .nav-dropdown-chevron {
    width: 11px;
    height: 11px;
    color: var(--t3);
    transition: transform 0.25s ease, color 0.2s ease;
  }
  .nav-dropdown.open .nav-dropdown-trigger {
    border-color: rgba(255, 255, 255, 0.35);
    color: var(--t1);
    background: var(--panel-hover);
  }
  .nav-dropdown.open .nav-dropdown-chevron {
    transform: rotate(180deg);
    color: var(--t1);
  }

  /* Dropdown panel */
  .nav-dropdown-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    min-width: 280px;
    padding: 8px;
    background: rgba(8, 8, 10, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
    z-index: 30;
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    transform-origin: top right;
    pointer-events: none;
    transition: opacity 0.18s cubic-bezier(0.2, 0.7, 0.2, 1),
                transform 0.18s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .nav-dropdown.open .nav-dropdown-menu {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .nav-dropdown-section {
    padding: 6px 10px 8px;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--t4);
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 4px;
  }
  .nav-dropdown-section:last-child { border-bottom: 0; }
  .nav-dropdown-item {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    padding: 10px 12px;
    border-radius: 9px;
    color: var(--t2);
    text-align: left;
    transition: background 0.15s ease, color 0.15s ease;
    cursor: pointer;
  }
  .nav-dropdown-item:hover {
    background: var(--panel-hover);
    color: var(--t1);
  }
  .nav-dropdown-item.is-active {
    background: var(--panel-hover);
    color: var(--t1);
  }
  .nav-dropdown-item .nav-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--dot-color, var(--t4));
    box-shadow: 0 0 8px var(--dot-color, transparent);
    flex-shrink: 0;
    opacity: 0.85;
  }
  .nav-dropdown-item .nav-item-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--t1);
    flex: 1;
    line-height: 1.2;
  }
  .nav-dropdown-item .nav-item-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--t3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 14ch;
  }
  .nav-dropdown-item .nav-item-count {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--t3);
    flex-shrink: 0;
  }
  .nav-dropdown-item.is-active .nav-item-count { color: var(--t1); }
  .nav-dropdown-item .nav-item-icon {
    width: 13px;
    height: 13px;
    color: var(--t3);
    flex-shrink: 0;
  }
  .nav-dropdown-item:hover .nav-item-icon { color: var(--t2); }
  .nav-dropdown-item .nav-active-mark {
    width: 12px;
    height: 12px;
    color: var(--dot-color, var(--amber));
    opacity: 0;
    flex-shrink: 0;
    transition: opacity 0.15s ease;
  }
  .nav-dropdown-item.is-active .nav-active-mark { opacity: 1; }

  /* ======================================================================
     LANDING — Hero
     ====================================================================== */
  #landing {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .hero-overlay {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    pointer-events: none;
    min-height: calc(100dvh - 70px);
  }

  /* ── Merch drop announcement banner ── */
  .merch-banner {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, rgba(212, 168, 83, 0.08) 0%, rgba(212, 146, 116, 0.06) 100%);
    border-bottom: 1px solid rgba(212, 168, 83, 0.2);
    padding: 18px 48px;
    animation: merchBannerSlide 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes merchBannerSlide {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .merch-banner-inner {
    max-width: var(--maxw-wide, 1400px);
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .merch-banner-carousel {

  .hero-content {

    content: "";

    width: 7px; height: 7px; border-radius: 50%;

  .hero-h1 .amber { color: var(--amber); font-style: italic; }

    font-weight: 300;
    line-height: 1.7;

  .stat { display: flex; flex-direction: column; gap: 5px; }
  .stat-val {
    font-family: var(--display);
    font-size: 30px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--t1);

  .stat-label {

    align-items: flex-end;

    align-items: center;
    gap: 12px;
    pointer-events: auto;
  }
  .btn-primary {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    color: #000;
    font-size: 13.5px;
    font-weight: 500;
    border-radius: 100px;
    border: 1px solid #fff;
    white-space: nowrap;
    overflow: hidden;
    isolation: isolate;
    transition: color 0.2s ease;
  }
  .btn-primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #fff;
    border-radius: inherit;
    transform: scaleX(1);
    transform-origin: left center;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: -1;
  }
  .btn-primary:hover::before { transform: scaleX(0); transform-origin: right center; }
  .btn-primary:hover { color: #fff; }
  .btn-primary svg { width: 14px; height: 14px; }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 14px 26px;
    color: var(--t2);
    font-size: 13.5px;
    font-weight: 400;
    border-radius: 100px;
    border: 1px solid var(--line);
    white-space: nowrap;

  .btn-secondary:hover { border-color: rgba(255, 255, 255, 0.4); color: var(--t1); }
  .btn-secondary svg { width: 12px; height: 12px; }
  .btn-shop { border-color: rgba(155, 191, 155, 0.3); color: var(--sage); }
  .btn-shop:hover { border-color: rgba(155, 191, 155, 0.6); color: #aaccaa; }
  .hero-foot {

    align-items: flex-end;

  .foot-note-cta {
    width: fit-content;
    font-size: 13px;
    font-weight: 400;
    color: var(--t2);
    border-bottom: 1px solid var(--line);

    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .foot-note-cta b { color: var(--t1); font-weight: 600; }
  .foot-note-cta:hover { color: var(--t1); border-color: rgba(255, 255, 255, 0.4); }
  .hero-foot-note {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--t4);
  }
  .scroll-cue {
    flex: 0 0 auto;
    align-self: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    padding-bottom: 22px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease 1.8s;

  .scroll-cue.in { opacity: 1; }
  .scroll-cue span {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;

    top: -100%; left: 0;

    animation: scrollDrop 2s ease-in-out infinite;

  .anim.in { opacity: 1; }

  .hero-h1 { transition-delay: 0.5s; }

  /* ======================================================================
     LANDING — Pete Pic of the Day
     ====================================================================== */
  #potd {
    padding: 72px 48px 56px;
    background: var(--bg);
  }
  .potd-inner {
    max-width: var(--maxw-wide);
    margin: 0 auto;
  }
  .potd-header {
    margin-bottom: 28px;
    text-align: center;
  }
  .potd-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    padding: 6px 14px;
    background: rgba(212, 168, 83, 0.06);
    border: 1px solid rgba(212, 168, 83, 0.2);
    border-radius: 100px;
  }
  .potd-dot {
    color: var(--amber);
    font-size: 14px;
    line-height: 1;
  }
  .potd-title {
    font-family: var(--display);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.015em;
    color: #fff;
    margin-bottom: 10px;
  }
  .potd-title .thin { color: var(--t3); font-style: italic; }
  .potd-sub {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--t3);
    letter-spacing: 0.04em;
    max-width: 56ch;
    margin: 0 auto;
    line-height: 1.5;
  }
  .potd-card {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 0;
    background: rgba(8, 8, 10, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
  }
  .potd-card:hover {
    border-color: rgba(212, 168, 83, 0.35);
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
  }
  .potd-image {
    position: relative;
    /* Use the image's natural aspect ratio instead of forcing square.
       Min-height ensures the card has presence even for small images. */
    min-height: 520px;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .potd-image img {
    /* Show the full image without cropping (contain instead of cover) */
    width: 100%;
    height: 100%;
    max-height: 640px;
    object-fit: contain;
    display: block;
    transition: transform 0.6s ease;
  }
  .potd-card:hover .potd-image img {
    transform: scale(1.03);
  }
  .potd-image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(8, 8, 10, 0.4));
    pointer-events: none;
  }
  .potd-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    padding: 5px 12px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid var(--line);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--t1);
  }
  .potd-info {
    padding: 40px 40px 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
  }
  .potd-info-eyebrow {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
  }
  .potd-info-title {
    font-family: var(--display);
    font-size: clamp(26px, 3.4vw, 40px);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--t1);
    margin: 4px 0;
  }
  .potd-info-meta {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--t3);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .potd-info-meta .sep { color: var(--t4); }
  .potd-info-cta {
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: gap 0.25s ease;
  }
  .potd-info-cta svg { width: 14px; height: 14px; }
  .potd-card:hover .potd-info-cta { gap: 14px; }
  .potd-foot {
    margin-top: 28px;
    display: flex;
    justify-content: center;
  }
  .potd-random-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 26px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 100px;
    color: var(--t2);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .potd-random-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(212, 168, 83, 0.06);
  }
  .potd-random-btn:hover svg {
    transform: rotate(180deg);
  }
  .potd-random-btn svg {
    width: 14px;
    height: 14px;
    transition: transform 0.4s ease;
  }
  @media (max-width: 900px) {
    .potd-card { grid-template-columns: 1fr; }
    .potd-image { min-height: 360px; }
    .potd-image img { max-height: 480px; }

    #potd { padding: 56px 22px 40px; }
    .potd-image { min-height: 280px; }
    .potd-info-title { font-size: 22px; }
  }

  /* ======================================================================
     LANDING — Collections
     ====================================================================== */
  #collections {
    padding: 80px 48px 64px;
    background:
      radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.025), transparent 55%),
      var(--bg);
  }
  .collections-inner { max-width: var(--maxw-wide); margin: 0 auto; }

    margin-bottom: 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }
  .collections-title {
    font-family: var(--display);
    font-size: clamp(34px, 5vw, 56px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.015em;
    color: #fff;
  }
  .collections-title .thin { color: var(--t3); font-style: italic; }
  .collections-sub {
    font-size: 14px;
    font-weight: 300;
    color: var(--t2);
    max-width: 38ch;
    line-height: 1.6;
  }
  .collections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }
  .room-card {
    position: relative;
    display: block;
    padding: 24px 26px 28px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    color: var(--t1);
    transition: border-color 0.3s ease, background 0.3s ease, transform 0.3s ease;

    cursor: pointer;

  .room-card::before {
    content: "";
    position: absolute;

    opacity: 0.6;
    transition: opacity 0.3s ease;

    background: var(--panel-hover);
    border-color: rgba(255, 255, 255, 0.18);
    transform: translateY(-2px);
  }
  .room-card:hover::before { opacity: 1; }
  .room-card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .room-card-name {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.005em;
    color: var(--room-color, var(--t1));

  .room-card-count {
    font-family: var(--mono);
    font-size: 11px;

    letter-spacing: 0.06em;

  .room-card-arrow svg { width: 15px; height: 15px; }

  .room-rust   { --room-color: var(--rust); }
  .room-rose   { --room-color: var(--rose); }
  .room-sage   { --room-color: var(--sage); }
  .room-violet { --room-color: var(--violet); }

    margin-bottom: 24px;

    gap: 8px;

    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
